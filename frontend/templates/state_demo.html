<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual States Playground & Error Reference</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet" />
    
    <!-- Code Highlight styles (custom modern styling) -->
    <style>
        :root {
            --bg-darker: #080808;
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --border-color: #2D2D2D;
            --text-main: #F5F0ED;
            --text-muted: #A89B92;
            
            --primary: #E8293F;
            --primary-glow: rgba(232, 41, 63, 0.15);
            --primary-dark: #8B0D1C;
            
            --accent-gold: #D4A847;
            --accent-gold-glow: rgba(212, 168, 71, 0.15);
            
            --success-green: #10B981;
            --success-glow: rgba(16, 185, 129, 0.15);
            
            --info-blue: #3B82F6;
            --info-glow: rgba(59, 130, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(18, 18, 18, 0.85);
        }

        .header-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
            font-family: 'DM Sans', sans-serif;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .btn-back {
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: transparent;
            cursor: pointer;
        }

        .btn-back:hover {
            background: #222;
            border-color: #555;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 500px;
            flex-grow: 1;
            min-height: calc(100vh - 89px);
        }

        /* Sidebar for State Selection */
        .sidebar {
            background: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-left: 8px;
            font-weight: 700;
        }

        .state-tab-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .state-tab-btn:hover {
            background: #181818;
            color: var(--text-main);
        }

        .state-tab-btn.active {
            background: var(--primary-glow);
            color: var(--text-main);
            border-color: rgba(232, 41, 63, 0.3);
            font-weight: 700;
        }

        .state-tab-btn .badge {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: #2D2D2D;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .state-tab-btn.active .badge {
            background: var(--primary);
            color: #fff;
        }

        /* Interactive Showcase Sandbox */
        .showcase-area {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-darker);
            position: relative;
            border-right: 1px solid var(--border-color);
        }

        .sandbox-controls {
            position: absolute;
            top: 24px;
            display: flex;
            gap: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .sandbox-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .sandbox-btn.active, .sandbox-btn:hover {
            color: var(--text-main);
            background: #2a2a2a;
        }

        /* Container for rendered state visuals */
        .preview-container {
            width: 100%;
            max-width: 480px;
            min-height: 380px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .preview-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
            opacity: 0.8;
        }

        .preview-container.success-accent::before {
            background: var(--success-green);
        }
        .preview-container.warning-accent::before {
            background: var(--accent-gold);
        }
        .preview-container.info-accent::before {
            background: var(--info-blue);
        }

        /* Beautiful States UI Components */
        
        /* 1. Spinner/Loader State */
        .state-visual-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .glowing-spinner {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .spinner-outer {
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 3px solid transparent;
            border-bottom-color: var(--accent-gold);
            border-left-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin-reverse 1.2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* Skeleton Shimmer Layout */
        .skeleton-block {
            width: 100%;
            height: 16px;
            background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .skeleton-block.title {
            width: 60%;
            height: 24px;
            margin: 0 auto 16px auto;
        }

        .skeleton-block.short {
            width: 40%;
            margin: 0 auto;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Icons with interactive animations */
        .state-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: relative;
        }

        .state-icon.error-bg {
            background: rgba(232, 41, 63, 0.1);
            color: var(--primary);
            border: 1px solid rgba(232, 41, 63, 0.2);
            animation: pulse-red 2s infinite;
        }

        .state-icon.success-bg {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
            animation: pulse-green 2s infinite;
        }

        .state-icon.warning-bg {
            background: rgba(212, 168, 71, 0.1);
            color: var(--accent-gold);
            border: 1px solid rgba(212, 168, 71, 0.2);
            animation: pulse-gold 2s infinite;
        }

        .state-icon.info-bg {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(232, 41, 63, 0.4); }
            70% { box-shadow: 0 0 0 16px rgba(232, 41, 63, 0); }
            100% { box-shadow: 0 0 0 0 rgba(232, 41, 63, 0); }
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 16px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 168, 71, 0.4); }
            70% { box-shadow: 0 0 0 16px rgba(212, 168, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 168, 71, 0); }
        }

        .state-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .state-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
            max-width: 320px;
        }

        .state-action-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(232, 41, 63, 0.3);
        }

        .state-action-btn:hover {
            background: #ff3b52;
            transform: translateY(-1px);
        }

        .state-action-btn.secondary {
            background: #2a2a2a;
            color: var(--text-main);
            box-shadow: none;
            border: 1px solid var(--border-color);
        }

        .state-action-btn.secondary:hover {
            background: #333;
        }

        /* Dropdown selection inside preview */
        .status-dropdown {
            background: #181818;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            font-size: 13px;
            cursor: pointer;
        }

        /* Success Confetti Animation Elements */
        .confetti {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--success-green);
            opacity: 0;
            border-radius: 50%;
        }

        /* Code/Documentation Panel (Right) */
        .code-panel {
            background: var(--bg-dark);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .code-tabs {
            display: flex;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px 0 16px;
            gap: 4px;
        }

        .code-tab-btn {
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .code-tab-btn:hover {
            color: var(--text-main);
        }

        .code-tab-btn.active {
            background: var(--bg-dark);
            color: var(--primary);
            border-color: var(--border-color);
            border-bottom: 2px solid var(--primary);
        }

        .code-content-wrapper {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg-dark);
        }

        .code-block {
            display: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            line-height: 1.6;
            color: #E2E8F0;
            white-space: pre-wrap;
            position: relative;
        }

        .code-block.active {
            display: block;
        }

        .copy-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: #2d2d2d;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .copy-btn:hover {
            color: var(--text-main);
            background: #3a3a3a;
        }

        /* Syntax Highlighting Colors */
        .token.comment { color: #6A9955; }
        .token.keyword { color: #569CD6; font-weight: bold; }
        .token.string { color: #CE9178; }
        .token.number { color: #B5CEA8; }
        .token.function { color: #DCDCAA; }
        .token.class-name { color: #4EC9B0; }
        .token.operator { color: #D4D4D4; }
        .token.punctuation { color: #808080; }
        .token.tag { color: #569CD6; }
        .token.attr-name { color: #9CDCFE; }
        .token.attr-value { color: #CE9178; }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-title">
            <h1>State Playground</h1>
            <p>Interactive playground to preview visual states, error types, and client-side handling</p>
        </div>
        <div class="header-actions">
            <button class="btn-back" onclick="window.location.href='/home'">← Go Shopping</button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-title">Application States</div>
            
            <button class="state-tab-btn active" onclick="selectState('loading')">
                <span>Loading State</span>
                <span class="badge">Fetch</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('empty')">
                <span>Empty State</span>
                <span class="badge">List</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('no_result')">
                <span>No Search Results</span>
                <span class="badge">Query</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('no_internet')">
                <span>No Internet</span>
                <span class="badge">Network</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('slow_network')">
                <span>Slow Network</span>
                <span class="badge">Delay</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('permission_denied')">
                <span>Permission Denied</span>
                <span class="badge">Auth</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('status_error')">
                <span>HTTP Status Code</span>
                <span class="badge">API</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('generic_error')">
                <span>Generic Error</span>
                <span class="badge">Crash</span>
            </button>
            <button class="state-tab-btn" onclick="selectState('success')">
                <span>Success State</span>
                <span class="badge">Complete</span>
            </button>
        </aside>

        <!-- Interactive Sandbox Showcase -->
        <main class="showcase-area">
            
            <!-- Dynamic Preview Container -->
            <div class="preview-container" id="preview-sandbox">
                <!-- Content gets dynamically updated by javascript -->
            </div>
            
        </main>

        <!-- Code Reference Documentation (Right Side) -->
        <aside class="code-panel">
            <div class="code-tabs">
                <button class="code-tab-btn active" onclick="selectCodeTab('js')">JAVASCRIPT</button>
                <button class="code-tab-btn" onclick="selectCodeTab('html')">HTML STRUCTURE</button>
                <button class="code-tab-btn" onclick="selectCodeTab('css')">VANILLA CSS</button>
            </div>
            
            <div class="code-content-wrapper">
                <!-- Javascript Code Block -->
                <pre class="code-block active" id="code-js"><button class="copy-btn" onclick="copyCode('code-js')">Copy</button><code id="code-js-content"></code></pre>
                
                <!-- HTML Code Block -->
                <pre class="code-block" id="code-html"><button class="copy-btn" onclick="copyCode('code-html')">Copy</button><code id="code-html-content"></code></pre>
                
                <!-- CSS Code Block -->
                <pre class="code-block" id="code-css"><button class="copy-btn" onclick="copyCode('code-css')">Copy</button><code id="code-css-content"></code></pre>
            </div>
        </aside>
    </div>

    <!-- State Data & Interactive Logic -->
    <script>
        // Holds visual elements, labels and descriptions for state presets
        const statesData = {
            loading: {
                accent: 'default',
                title: 'Loading Data...',
                desc: 'Please wait while we sync database records and assets.',
                html: `<div class="state-visual-loader">
    <div class="glowing-spinner">
        <div class="spinner-outer"></div>
        <div class="spinner-inner"></div>
    </div>
    <div style="width: 100%;">
        <div class="skeleton-block title"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block short"></div>
    </div>
</div>`,
                js: `// 1. LOADING STATE
// Triggered prior to starting an async fetch request
function fetchProducts() {
    const container = document.getElementById('product-list');
    
    // Set loading state visuals (Skeleton loader & glowing spinner)
    container.innerHTML = \`
        <div class="state-visual-loader">
            <div class="glowing-spinner">
                <div class="spinner-outer"></div>
                <div class="spinner-inner"></div>
            </div>
            <div style="width: 100%;">
                <div class="skeleton-block title"></div>
                <div class="skeleton-block"></div>
            </div>
        </div>
    \`;
    
    fetch('/api/products')
        .then(response => response.json())
        .then(data => renderProducts(data))
        .catch(err => renderError(err));
}`,
                css: `/* Glowing spinner with custom sub-rotations */
.glowing-spinner {
    position: relative;
    width: 60px;
    height: 60px;
}
.spinner-outer {
    width: 100%;
    height: 100%;
    border: 3px solid transparent;
    border-top-color: #E8293F;
    border-right-color: #E8293F;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
.spinner-inner {
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 3px solid transparent;
    border-bottom-color: #D4A847;
    border-left-color: #D4A847;
    border-radius: 50%;
    animation: spin-reverse 1.2s linear infinite;
}

/* Skeleton Loading Shimmering Animation */
.skeleton-block {
    width: 100%;
    height: 16px;
    background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
}
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
@keyframes spin {
    100% { transform: rotate(360deg); }
}
@keyframes spin-reverse {
    100% { transform: rotate(-360deg); }
}`
            },
            empty: {
                accent: 'info-accent',
                title: 'Your Cart is Empty',
                desc: 'Looks like you haven\'t added any items to your workspace checkout list yet.',
                html: `<div class="state-icon info-bg">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
</div>
<h3 class="state-title">Your Cart is Empty</h3>
<p class="state-desc">Looks like you haven't added any items to your workspace checkout list yet.</p>
<button class="state-action-btn" onclick="alert('Redirecting to catalogs!')">Browse Items</button>`,
                js: `// 2. EMPTY STATE
// Triggered when list returned successfully, but array is empty.
function renderCart(cartItems) {
    const container = document.getElementById('cart-container');
    
    if (!cartItems || cartItems.length === 0) {
        container.innerHTML = \`
            <div class="state-visual">
                <div class="state-icon info-bg">
                    <svg>...</svg>
                </div>
                <h3 class="state-title">Your Cart is Empty</h3>
                <p class="state-desc">Add some premium products to verify checkout functionality.</p>
                <button class="state-action-btn" onclick="routeToCatalog()">Browse Items</button>
            </div>
        \`;
        return;
    }
    
    // Otherwise render list elements...
}`,
                css: `/* Interactive state icons with soft background highlights */
.state-icon.info-bg {
    background: rgba(59, 130, 246, 0.1);
    color: #3B82F6;
    border: 1px solid rgba(59, 130, 246, 0.2);
}
.state-title {
    font-size: 20px;
    font-weight: 700;
    color: #F5F0ED;
    margin-bottom: 8px;
}
.state-desc {
    font-size: 14px;
    color: #A89B92;
    line-height: 1.5;
    margin-bottom: 24px;
    max-width: 320px;
}`
            },
            no_result: {
                accent: 'warning-accent',
                title: 'No Results Found',

                js: `// 5. SLOW NETWORK / REQUEST TIMEOUT
// Races your actual fetch call with a custom timeout promise.
function fetchWithTimeout(url, options = {}, timeoutMs = 5000) {
    let timeoutId;
    
    const timeoutPromise = new Promise((_, reject) => {
        timeoutId = setTimeout(() => {
            reject(new Error('TIMEOUT_SLOW_NETWORK'));
        }, timeoutMs);
    });
    
    return Promise.race([
        fetch(url, options),
        timeoutPromise
    ]).then(response => {
        clearTimeout(timeoutId);
        return response;
    }).catch(err => {
        clearTimeout(timeoutId);
        throw err;
    });
}

// Controller integration
function loadDashboard() {
    showLoading();
    fetchWithTimeout('/api/dashboard-data', {}, 6000) // 6s threshold
        .then(res => res.json())
        .then(data => renderData(data))
        .catch(err => {
            if (err.message === 'TIMEOUT_SLOW_NETWORK') {
                showState('slow_network');
            } else {
                showState('generic_error');
            }
        });
}`,

            }
        }

        // Initialize state playground
        window.addEventListener('DOMContentLoaded', () => {
            selectState('loading');
        });
    </script>
</body>
