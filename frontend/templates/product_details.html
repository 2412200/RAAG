<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - RAAG.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/category.css?v=1.0.0">
  <link rel="stylesheet" href="/static/css/cart.css?v=1.1.0">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <script src="/static/js/theme-toggle.js"></script>
  <script src="/static/js/cart.js?v=1.1.0"></script>
  <style>
    /* Details layout styles */
    .detail-container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      margin-top: 30px;
      background: #141414;
      border: 1px solid rgba(139, 13, 28, 0.2);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .detail-left {
      flex: 1;
      min-width: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-showcase {
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0f0f0f;
      aspect-ratio: 1;
    }

    .image-showcase img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .image-showcase:hover img {
      transform: scale(1.08);
    }

    .detail-right {
      flex: 1.2;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .detail-badge {
      align-self: flex-start;
      background: rgba(192, 23, 42, 0.12);
      border: 1px solid var(--red-light, #E8293F);
      color: var(--red-light, #E8293F);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .product-title {
      font-family: 'Playfair Display', serif !important;
      font-size: 32px;
      font-weight: 700;
      color: #F5F0ED;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .product-price-txt {
      font-size: 24px;
      font-weight: 700;
      color: #D4A847;
      margin-bottom: 24px;
      font-family: 'DM Sans', sans-serif;
    }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .specs-table tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .specs-table td {
      padding: 12px 0;
      font-size: 14px;
    }

    .specs-label {
      color: #A89B92;
      width: 140px;
      font-weight: 500;
    }

    .specs-value {
      color: #F5F0ED;
      font-weight: 600;
    }

    .size-badge {
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 4px 10px;
      border-radius: 6px;
      margin-right: 6px;
      font-size: 12px;
      color: #F5F0ED;
      background: rgba(255, 255, 255, 0.05);
    }

    .description-box {
      margin-bottom: 30px;
    }

    .description-box h3 {
      font-size: 15px;
      font-weight: 700;
      color: #F5F0ED;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .description-box p {
      font-size: 14px;
      color: #A89B92;
      line-height: 1.6;
    }

    .purchase-section {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 30px;
    }

    .qty-picker {
      display: flex;
      align-items: center;
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      height: 48px;
    }

    .qty-btn {
      width: 40px;
      height: 100%;
      background: transparent;
      border: none;
      color: #F5F0ED;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qty-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .qty-input {
      width: 45px;
      background: transparent;
      border: none;
      color: #F5F0ED;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    /* Hide standard chrome spin button */
    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .detail-add-btn {
      flex: 1;
      min-width: 180px;
      height: 48px;
      background: #C0172A;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(192, 23, 42, 0.25);
    }

    .detail-add-btn:hover {
      background: #E8293F;
      transform: translateY(-1px);
    }

    .detail-add-btn:active {
      transform: translateY(0);
    }

    /* Shimmer Skeleton Styles */
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: loading-shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes loading-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-image {
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }

    .skeleton-text {
      height: 20px;
      margin-bottom: 12px;
      width: 80%;
    }

    .skeleton-title {
      height: 35px;
      margin-bottom: 15px;
      width: 60%;
    }

    /* Toast notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      margin-left: -125px;
      background-color: #8B0D1C;
      color: #F5F0ED;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 99999;
      left: 50%;
      bottom: 30px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #E8293F;
    }

    #toast.show {
      visibility: visible;
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }

    @keyframes fadein {
      from { bottom: 0; opacity: 0; }
      to { bottom: 30px; opacity: 1; }
    }

    @keyframes fadeout {
      from { bottom: 30px; opacity: 1; }
      to { bottom: 0; opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Mobile Navbar -->
  <div class="mobile-navbar">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">☰</button>
    <div class="mobile-navbar-brand">RAAG</div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button id="mobile-cart-toggle" class="sidebar-toggle-btn" style="position: relative; border: none; font-size: 18px;" aria-label="Toggle Cart">
        🛒<span id="mobile-cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; display: none;">0</span>
      </button>
      <a href="/logout" class="mobile-logout-btn">Logout</a>
    </div>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">RAAG</div>
        <nav class="sidebar-menu">
          <a href="/home" id="nav-home" class="menu-item">
            Home
          </a>
          <a href="/orders" id="nav-orders" class="menu-item">
            My Orders
          </a>
        </nav>
      </div>
      <div id="sidebar-cart" class="sidebar-cart"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="dashboard-title">
          <h1>Product Specifications</h1>
          <p>Detailed overview of business listing specs</p>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
      </header>

      <div class="page-header" style="padding: 1rem 0; border-bottom: none; display: flex; align-items: center; gap: 12px;">
        <div class="page-header-accent"></div>
        <div>
          <div class="breadcrumb"><a href="/home">Home</a> &nbsp;/&nbsp; Details</div>
        </div>
      </div>

      <!-- Shimmer Loader Container -->
      <div id="loader-view" class="detail-container">
        <div class="detail-left">
          <div class="image-showcase">
            <div class="skeleton skeleton-image"></div>
          </div>
        </div>
        <div class="detail-right" style="gap:20px;">
          <div>
            <div class="skeleton" style="width: 100px; height: 20px; margin-bottom: 15px;"></div>
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton" style="width: 120px; height: 28px; margin-bottom: 30px;"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width: 90%;"></div>
            <div class="skeleton skeleton-text" style="width: 70%;"></div>
          </div>
          <div class="skeleton" style="width: 100%; height: 48px; border-radius: 8px;"></div>
        </div>
      </div>

      <!-- Core Details View -->
      <div id="details-view" class="detail-container" style="display: none;">
        <div class="detail-left">
          <div class="image-showcase">
            <img id="detail-img" src="" alt="" onerror="this.onerror=null;this.src='/static/images/default.webp'">
          </div>
        </div>
        <div class="detail-right">
          <div>
            <div id="detail-spec-badge" class="detail-badge"></div>
            <h2 id="detail-title" class="product-title"></h2>
            <div id="detail-price" class="product-price-txt"></div>

            <table class="specs-table">
              <tbody id="specs-body">
                <!-- Dynamically populated spec items -->
              </tbody>
            </table>

            <div class="description-box">
              <h3>Description</h3>
              <p id="detail-desc"></p>
            </div>
          </div>

          <div class="purchase-section">
            <div class="qty-picker">
              <button class="qty-btn" id="qty-minus">—</button>
              <input type="number" class="qty-input" id="qty-num" value="1" min="1">
              <button class="qty-btn" id="qty-plus">+</button>
            </div>
            <button class="detail-add-btn" id="add-to-cart-action">Add to Cart</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer>
    <span class="footer-brand">RAAG.COM</span>
    <span class="footer-note">© 2026 Raag. All rights reserved.</span>
  </footer>

  <div id="toast">✅ Item added to cart!</div>

  <script>
    const productId = "{{ product_id }}";
    const specification = "{{ specification }}";
    let productData = null;

    document.addEventListener("DOMContentLoaded", () => {
      fetchProductDetails();
    });

    async function fetchProductDetails() {
      const loader = document.getElementById("loader-view");
      const view = document.getElementById("details-view");

      try {
        const response = await fetch(`/GET/product?product_id=${productId}&specification=${specification}`);
        if (!response.ok) throw new Error("Failed to load details");
        productData = await response.json();

        populateUI(productData);
        loader.style.display = "none";
        view.style.display = "flex";
      } catch (err) {
        console.error(err);
        loader.innerHTML = '<div style="color:#E8293F; text-align:center; width:100%; padding:80px; font-weight:600;">Failed to load product specifications. Please try again.</div>';
      }
    }

    function populateUI(product) {
      // 1. Populate basic information
      const title = product.product_name || product.name || "Unnamed Product";
      const price = product.price || product.mrp || 0.0;
      const moq = parseInt(product.moq || product.quantity || 1);
      const desc = product.description || "No description provided.";
      
      const imageSrc = product.images && product.images.length > 0 ? product.images[0] : (product.image || 'default.webp');
      const imgSrc = imageSrc.startsWith('http') ? imageSrc : `/static/images/${imageSrc}`;

      document.getElementById("detail-title").innerText = title;
      document.getElementById("detail-price").innerText = "₹" + price.toLocaleString("en-IN");
      document.getElementById("detail-desc").innerText = desc;
      
      const imgEl = document.getElementById("detail-img");
      imgEl.src = imgSrc;
      imgEl.alt = title;

      // 2. Set dynamic spec badge
      const specBadge = document.getElementById("detail-spec-badge");
      specBadge.innerText = specification.replace('_', ' ');

      // 3. Set dynamic MOQ limit to quantity picker
      const qtyInput = document.getElementById("qty-num");
      qtyInput.value = moq;
      qtyInput.min = moq;

      // Quantity buttons setup
      document.getElementById("qty-plus").onclick = () => {
        qtyInput.value = parseInt(qtyInput.value) + 1;
      };
      document.getElementById("qty-minus").onclick = () => {
        const val = parseInt(qtyInput.value);
        if (val > moq) {
          qtyInput.value = val - 1;
        }
      };

      // 4. Populate category specific table rows
      const specsBody = document.getElementById("specs-body");
      let specRows = "";

      // Standard attributes
      specRows += createSpecRow("Category", product.category || specification.toUpperCase());
      specRows += createSpecRow("Minimum Order", `${moq} units`);

      if (specification === "apparel") {
        const sizesHtml = (product.size || []).map(s => `<span class="size-badge">${s}</span>`).join('');
        specRows += createSpecRow("Available Sizes", sizesHtml || "N/A", true);
        specRows += createSpecRow("Fabric Material", product.fabric || "Cotton Mix");
        specRows += createSpecRow("GSM Density", product.gsm ? `${product.gsm} gsm` : "180 gsm");
        if (product.gender) specRows += createSpecRow("Gender Focus", product.gender);
      }
      else if (specification === "fmcg") {
        if (product.brand) specRows += createSpecRow("Brand Label", product.brand);
        if (product.manufacturing_date) specRows += createSpecRow("Mfg Date", formatDate(product.manufacturing_date));
        if (product.expiry_date) specRows += createSpecRow("Expiry Date", formatDate(product.expiry_date));
      }
      else if (specification === "mobile_accessories") {
        if (product.brand) specRows += createSpecRow("Accessory Brand", product.brand);
        if (product.compatible_model) specRows += createSpecRow("Compatibility", product.compatible_model);
        if (product.accessory_type) specRows += createSpecRow("Accessory Type", product.accessory_type);
        if (product.color) specRows += createSpecRow("Color Tone", product.color);
        if (product.warranty) specRows += createSpecRow("Warranty Period", `${product.warranty} months`);
      }
      else if (specification === "steel_work") {
        if (product.steel_grade) specRows += createSpecRow("Steel Grade", product.steel_grade);
        if (product.thickness) specRows += createSpecRow("Metal Thickness", `${product.thickness} mm`);
        if (product.weight) specRows += createSpecRow("Weight Density", `${product.weight} kg`);
        if (product.finish_type) specRows += createSpecRow("Finish Profile", product.finish_type);
      }
      else if (specification === "home_appliances") {
        if (product.brand) specRows += createSpecRow("Appliance Brand", product.brand);
        if (product.warranty) specRows += createSpecRow("Warranty Protection", `${product.warranty} months`);
      }
      else if (specification === "pharmacy") {
        if (product.brand) specRows += createSpecRow("Pharma Brand", product.brand);
        if (product.expiry_date) specRows += createSpecRow("Expiry Timeline", formatDate(product.expiry_date));
      }

      specsBody.innerHTML = specRows;

      // 5. Add to Cart action bindings
      document.getElementById("add-to-cart-action").onclick = () => {
        const quantity = parseInt(qtyInput.value);
        if (isNaN(quantity) || quantity < moq) {
          alert(`Minimum order quantity for this item is ${moq} units.`);
          return;
        }
        
        // Call global cart.js method
        addToOrder({
          name: title,
          image: imageSrc,
          quantity: quantity,
          price: price
        });
        
        showToast();
      };
    }

    function createSpecRow(label, value, raw = false) {
      return `
        <tr>
          <td class="specs-label">${label}</td>
          <td class="specs-value">${raw ? value : escapeHtml(value)}</td>
        </tr>
      `;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "N/A";
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString("en-IN", { year: 'numeric', month: 'long', day: 'numeric' });
      } catch (e) {
        return dateStr;
      }
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return unsafe;
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
