<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAAG — Reset Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1e1e1e;
      --border-active: #3a1a1a;
      --accent: #e03030;
      --accent-dim: rgba(224,48,48,0.12);
      --text: #f0f0f0;
      --muted: #555555;
      --error: #ff6b6b;
      --success: #e03030;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
    }

    .panel--form {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 40px;
      width: 100%;
    }

    .form {
      width: 100%;
      max-width: 480px;
      padding: 20px 0;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form > * {
      animation: fadeUp 0.4s ease both;
    }
    .form > *:browse-delay { animation-delay: 0.05s; }
    .form > *:nth-child(1) { animation-delay: 0.05s; }
    .form > *:nth-child(2) { animation-delay: 0.10s; }
    .form > *:nth-child(3) { animation-delay: 0.15s; }
    .form > *:nth-child(4) { animation-delay: 0.20s; }
    .form > *:nth-child(5) { animation-delay: 0.25s; }

    .overline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
    }

    .display {
      font-family: var(--font-display);
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .form-head {
      margin-bottom: 32px;
    }

    .form-head .display {
      margin: 8px 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    /* Role toggle */
    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .role-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text);
    }

    .role-btn:hover { border-color: var(--border-active); }

    .role-btn.is-active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .role-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    .role-btn.is-active .role-num { color: var(--accent); }

    .role-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .field input::placeholder { color: #333; }

    .field input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(224,48,48,0.08);
    }

    .field input.is-invalid { border-color: var(--error); }

    .field-error {
      font-size: 11px;
      color: var(--error);
      font-family: var(--font-mono);
      min-height: 16px;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .link-btn:hover { color: var(--text); }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .link:hover { text-decoration: underline; }
    .link--strong { font-weight: 600; }

    .cta {
      width: 100%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .cta:active { transform: translateY(0); }
    .cta:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .status.is-error   { background: rgba(255,107,107,0.1); color: var(--error); border: 1px solid rgba(255,107,107,0.2); }
    .status.is-success { background: rgba(224,48,48,0.1); color: var(--accent); border: 1px solid rgba(224,48,48,0.2); }

    .form-foot {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .panel--form { padding: 32px 20px; }
    }
  </style>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
</head>
<body>
  <main class="page">
    <section class="panel--form">
      <form id="forgot-password-form" class="form" novalidate>

        <div class="form-head">
          <span class="overline">[ 03 / PASSWORD RESET ]</span>
          <h1 class="display">Reset.</h1>
          <p class="subtitle">Enter your registered details to reset your password.</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" role="tablist" aria-label="Select profile">
          <button type="button" class="role-btn is-active" data-role="seller" role="tab" aria-selected="true">
            <span class="role-num">01</span>
            <span class="role-name">Seller</span>
          </button>
          <button type="button" class="role-btn" data-role="buyer" role="tab" aria-selected="false">
            <span class="role-num">02</span>
            <span class="role-name">Buyer</span>
          </button>
        </div>

        <!-- Step 1 field: Phone -->
        <label class="field" id="phone-field">
          <span class="field-label">Phone Number</span>
          <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" required />
          <span class="field-error" id="phone-error"></span>
        </label>

        <!-- Step 2 fields: OTP & Password Reset (Initially hidden) -->
        <div id="reset-fields-container" style="display: none;">
          <div class="divider"><span>VERIFICATION & NEW PASSWORD</span></div>
          
          <label class="field">
            <span class="field-label">Verification Code (OTP)</span>
            <input id="otp" name="otp" type="text" placeholder="Enter OTP code" maxlength="6" autocomplete="one-time-code" />
            <span class="field-error" id="otp-error"></span>
          </label>

          <label class="field">
            <span class="field-label">
              New Password
              <button type="button" id="toggle-password" class="link-btn" aria-label="Show password">show</button>
            </span>
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
            <span class="field-error" id="password-error"></span>
          </label>

          <label class="field">
            <span class="field-label">Confirm New Password</span>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="••••••••" required />
            <span class="field-error" id="confirm-error"></span>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="cta">
          <span class="cta-label">Send Verification Code</span>
          <span class="cta-arrow">→</span>
        </button>

        <!-- Status -->
        <div id="status" class="status" hidden></div>

        <p class="form-foot">
          Remember your password?
          <a href="/" class="link link--strong">Sign in →</a>
        </p>

      </form>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const form = document.getElementById('forgot-password-form');
      const roleButtons = document.querySelectorAll('.role-btn');
      const submitBtn = document.getElementById('submit-btn');
      const submitLabel = submitBtn.querySelector('.cta-label');
      const status = document.getElementById('status');
      
      const phoneInput = document.getElementById('phone');
      const otpInput = document.getElementById('otp');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');
      
      const togglePwBtn = document.getElementById('toggle-password');
      const resetFieldsContainer = document.getElementById('reset-fields-container');

      let selectedRole = 'seller';
      let otpRequested = false;

      // Handle password visibility toggle
      if (togglePwBtn && passwordInput) {
        togglePwBtn.addEventListener('click', () => {
          const isPw = passwordInput.type === 'password';
          passwordInput.type = isPw ? 'text' : 'password';
          togglePwBtn.textContent = isPw ? 'hide' : 'show';
          togglePwBtn.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
        });
      }

      // Role button switching
      roleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (otpRequested) return; // Lock role selection after code is sent
          
          roleButtons.forEach(b => {
            b.classList.remove('is-active');
            b.setAttribute('aria-selected', 'false');
          });

          btn.classList.add('is-active');
          btn.setAttribute('aria-selected', 'true');
          selectedRole = btn.dataset.role;
        });
      });

      // Error setter helper
      function setError(inputEl, errorId, message) {
        const errorEl = document.getElementById(errorId);
        if (message) {
          inputEl.classList.add('is-invalid');
          errorEl.textContent = message;
        } else {
          inputEl.classList.remove('is-invalid');
          errorEl.textContent = '';
        }
      }

      // Status notifications
      function showStatus(message, type) {
        status.hidden = false;
        status.className = `status ${type === 'success' ? 'is-success' : 'is-error'}`;
        status.textContent = message;
      }

      function clearStatus() {
        status.hidden = true;
        status.className = 'status';
        status.textContent = '';
      }

      // Validation logic
      function validateForm() {
        let isValid = true;

        if (!otpRequested) {
          // Validate Phone
          const phone = phoneInput.value.trim();
          if (!phone) {
            setError(phoneInput, 'phone-error', 'Phone number is required.');
            isValid = false;
          } else if (!/^[+\d\s\-()]{7,15}$/.test(phone)) {
            setError(phoneInput, 'phone-error', 'Enter a valid phone number.');
            isValid = false;
          } else {
            setError(phoneInput, 'phone-error', '');
          }
        } else {
          // Validate OTP, Password & Confirm Password
          const otp = otpInput.value.trim();
          if (!otp) {
            setError(otpInput, 'otp-error', 'Verification code is required.');
            isValid = false;
          } else if (!/^\d{4,8}$/.test(otp)) {
            setError(otpInput, 'otp-error', 'Please enter a valid OTP code.');
            isValid = false;
          } else {
            setError(otpInput, 'otp-error', '');
          }

          const password = passwordInput.value;
          if (!password) {
            setError(passwordInput, 'password-error', 'Password is required.');
            isValid = false;
          } else if (password.length < 6) {
            setError(passwordInput, 'password-error', 'Minimum 6 characters required.');
            isValid = false;
          } else {
            setError(passwordInput, 'password-error', '');
          }

          const confirmPassword = confirmInput.value;
          if (!confirmPassword) {
            setError(confirmInput, 'confirm-error', 'Please confirm your password.');
            isValid = false;
          } else if (password !== confirmPassword) {
            setError(confirmInput, 'confirm-error', 'Passwords do not match.');
            isValid = false;
          } else {
            setError(confirmInput, 'confirm-error', '');
          }
        }

        return isValid;
      }

      // Submit handling
      form.addEventListener('submit', async e => {
        e.preventDefault();
        clearStatus();

        if (!validateForm()) return;

        submitBtn.disabled = true;

        if (!otpRequested) {
          submitLabel.textContent = 'Sending code...';
          const payload = {
            phone: phoneInput.value.trim(),
            role: selectedRole
          };

          try {
            const response = await fetch('/POST/request-forgot-password-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
              showStatus(data.detail || 'Failed to send verification code.', 'error');
              return;
            }

            // Code sent, show step 2 fields
            otpRequested = true;
            phoneInput.disabled = true;
            
            // Lock role buttons pointer interactions
            roleButtons.forEach(btn => btn.style.pointerEvents = 'none');

            resetFieldsContainer.style.display = 'block';
            otpInput.focus();
            submitLabel.textContent = 'Reset Password';
            showStatus('Verification code sent to your phone number!', 'success');

          } catch (error) {
            console.error(error);
            showStatus('Network error requesting verification code.', 'error');
          } finally {
            submitBtn.disabled = false;
          }
        } else {
          submitLabel.textContent = 'Resetting password...';
          const payload = {
            phone: phoneInput.value.trim(),
            role: selectedRole,
            otp: otpInput.value.trim(),
            password: passwordInput.value
          };

          try {
            const response = await fetch('/POST/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
              showStatus(data.detail || 'Password reset failed.', 'error');
              return;
            }

            showStatus('Password updated successfully! Redirecting to sign in...', 'success');
            setTimeout(() => {
              window.location.href = '/';
            }, 1500);

          } catch (error) {
            console.error(error);
            showStatus('Network error resetting password.', 'error');
          } finally {
            submitBtn.disabled = false;
          }
        }
      });
    })();
  </script>
</body>
</html>
