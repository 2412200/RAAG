<!-- frontend/templates/forgot_password.html - Password reset template page linking static styles and javascript flow for OTP authorization. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAAG — Reset Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', path='css/forgot_password.css') }}?v=1.0.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>
<body>
  <div class="loader-overlay" id="loader-overlay">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-text">Loading...</div>
  </div>
  <main class="page">
    <section class="panel--form">
      <form id="forgot-password-form" class="form" novalidate>

        <div class="form-head">
          <span class="overline">[ 03 / PASSWORD RESET ]</span>
          <h1 class="display">Reset.</h1>
          <p class="subtitle">Enter your registered details to reset your password.</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" role="tablist" aria-label="Select profile">
          <button type="button" class="role-btn is-active" data-role="seller" role="tab" aria-selected="true">
            <span class="role-num">01</span>
            <span class="role-name">Seller</span>
          </button>
          <button type="button" class="role-btn" data-role="buyer" role="tab" aria-selected="false">
            <span class="role-num">02</span>
            <span class="role-name">Buyer</span>
          </button>
        </div>

        <!-- Step 1 field: Phone -->
        <label class="field" id="phone-field">
          <span class="field-label">Phone Number</span>
          <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" required />
          <span class="field-error" id="phone-error"></span>
        </label>

        <!-- Step 2 fields: OTP & Password Reset (Initially hidden) -->
        <div id="reset-fields-container" style="display: none;">
          <div class="divider"><span>VERIFICATION & NEW PASSWORD</span></div>
          
          <label class="field">
            <span class="field-label">Verification Code (OTP)</span>
            <input id="otp" name="otp" type="text" placeholder="Enter OTP code" maxlength="6" autocomplete="one-time-code" />
            <span class="field-error" id="otp-error"></span>
          </label>

          <label class="field">
            <span class="field-label">
              New Password
              <button type="button" id="toggle-password" class="link-btn" aria-label="Show password">show</button>
            </span>
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
            <span class="field-error" id="password-error"></span>
          </label>

          <label class="field">
            <span class="field-label">Confirm New Password</span>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="••••••••" required />
            <span class="field-error" id="confirm-error"></span>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="cta">
          <span class="cta-label">Send Verification Code</span>
          <span class="cta-arrow">→</span>
        </button>

        <!-- Status -->
        <div id="status" class="status" hidden></div>

        <p class="form-foot">
          Remember your password?
          <a href="/" class="link link--strong">Sign in →</a>
        </p>

      </form>
    </section>
  </main>

  <script src="{{ url_for('static', path='js/forgot_password.js') }}?v=1.0.0"></script>
</body>
</html>
