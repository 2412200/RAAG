<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D0D0D;
            color: #F5F0ED;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .site {
            min-height: 100vh;
            background: #0D0D0D;
            display: flex;
            flex-direction: row;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #181818;
            border-right: 1px solid #8B0D1C;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: #A89B92;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: #222;
            color: #F5F0ED;
        }

        .menu-item.active {
            background: #8B0D1C;
            color: #F5F0ED;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .dashboard-title h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard-title p {
            color: #A89B92;
            font-size: 14px;
            margin-top: 4px;
        }

        .logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Mobile Nav styles */
        .mobile-navbar {
            display: none;
            background: #181818;
            border-bottom: 1px solid #8B0D1C;
            padding: 10px 20px;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .mobile-navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 2px;
        }

        .sidebar-toggle-btn {
            background: transparent;
            border: 1px solid #8B0D1C;
            color: #F5F0ED;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-toggle-btn:hover {
            background: #222;
        }

        .mobile-logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .mobile-logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Override style.css light modes */
        .orders-container {
            max-width: 900px;
            margin: 0;
            padding: 20px 0;
        }

        .orders-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #F5F0ED;
        }

        .orders-container h1::after {
            content: none;
        }

        .order-item {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            gap: 20px;
        }

        .order-item:hover {
            border-color: #8B0D1C !important;
        }

        .order-item img {
            border-radius: 8px;
            border: 1px solid #222;
        }

        .order-info h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
        }

        .order-info p {
            color: #A89B92;
        }

        .order-price {
            color: #D4A847;
        }

        .remove-btn {
            border-color: #8B0D1C !important;
            color: #E8293F !important;
            border-radius: 8px;
        }

        .remove-btn:hover {
            background: rgba(139, 13, 28, 0.2) !important;
        }

        .order-summary {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 24px;
            text-align: right;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            margin-top: 10px;
        }

        .order-summary h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
            margin-bottom: 16px;
        }

        .confirm-btn {
            background: #C0172A !important;
            color: #F5F0ED !important;
            border-radius: 8px;
        }

        .confirm-btn:hover {
            background: #E8293F !important;
            transform: translateY(-1px);
        }

        .empty-msg {
            color: #A89B92;
            margin-top: 60px;
            font-size: 16px;
        }

        footer {
            background: #181818;
            border-top: 1px solid #8B0D1C;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            color: #C0172A;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .footer-note {
            font-size: 12px;
            color: #A89B92;
        }

        /* ── RESPONSIVE MEDIA QUERIES ── */
        @media (max-width: 768px) {
            .site {
                flex-direction: column;
            }

            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 60px;
                bottom: 0;
                left: 0;
                width: 280px;
                z-index: 1001;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                min-height: calc(100vh - 60px);
            }

            .mobile-navbar {
                display: flex;
            }

            .dashboard-header {
                display: none;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                position: relative;
                padding: 16px;
            }

            .order-item img {
                width: 100%;
                height: 160px;
            }

            .remove-btn {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .order-summary {
                padding: 16px;
                text-align: center;
            }

            footer {
                padding: 1.25rem 1rem;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>

<body>
  <!-- Mobile Navbar -->
  <div class="mobile-navbar">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">☰</button>
    <div class="mobile-navbar-brand">RAAG</div>
    <a href="/logout" class="mobile-logout-btn">Logout</a>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">RAAG</div>
        <nav class="sidebar-menu">
          <a href="/home" class="menu-item">
            Home
          </a>
          <a href="/orders" class="menu-item active">
            My Orders
          </a>
        </nav>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="dashboard-title">
          <h1>My Orders</h1>
          <p>Manage your pending and confirmed orders</p>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
      </header>

      <div class="orders-container">
        <div id="order-list"></div>
        <div id="order-summary" style="display:none;" class="order-summary">
            <h2>Total: ₹<span id="total-price">0</span></h2>
            <button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>
        </div>
        <div id="empty-msg" class="empty-msg">No items in your order yet.</div>
      </div>

      <footer>
        <span class="footer-brand">RAAG.COM</span>
        <span class="footer-note">© 2026 Raag. All rights reserved.</span>
      </footer>
    </main>
  </div>

    <script>
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            const list = document.getElementById('order-list');
            const summary = document.getElementById('order-summary');
            const emptyMsg = document.getElementById('empty-msg');
            const totalEl = document.getElementById('total-price');

            list.innerHTML = '';

            if (orders.length === 0) {
                emptyMsg.style.display = 'block';
                summary.style.display = 'none';
                return;
            }

            emptyMsg.style.display = 'none';
            summary.style.display = 'block';

            let total = 0;

            orders.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const imageSrc = item.image.startsWith('http') ? item.image : `/static/images/${item.image}`;

                list.innerHTML += `
                    <div class="order-item">
                        <img src="${imageSrc}" alt="${item.name}">
                        <div class="order-info">
                            <h3>${item.name}</h3>
                            <p>Qty: ${item.qty} &nbsp;|&nbsp; ₹${item.price} each</p>
                        </div>
                        <div class="order-price">₹${itemTotal.toLocaleString()}</div>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
            });

            totalEl.textContent = total.toLocaleString();
        }

        function removeItem(index) {
            let orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            orders.splice(index, 1);
            localStorage.setItem('orderItems', JSON.stringify(orders));
            loadOrders();
        }

        async function confirmOrder() {
            const orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            if (orders.length === 0) return;

            const products = orders.map(item => ({
                product_name: item.name,
                quantity: parseInt(item.qty),
                price: parseFloat(item.price)
            }));
            const total_amount = orders.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const payload = {
                customer_name: "Buyer Customer",
                customer_number: 9999999999,
                products: products,
                total_amount: total_amount
            };

            try {
                const res = await fetch('/POST/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    localStorage.removeItem('orderItems');
                    alert('Order confirmed successfully!');
                    loadOrders();
                } else {
                    alert('Failed to save order. Please try again.');
                }
            } catch (err) {
                console.error(err);
                alert('Network error. Please try again.');
            }
        }

        // Mobile sidebar toggle script
        const sidebarToggleBtn = document.getElementById("sidebar-toggle");
        const sidebarEl = document.querySelector(".sidebar");
        
        if (sidebarToggleBtn && sidebarEl) {
            sidebarToggleBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                sidebarEl.classList.toggle("show");
            });

            document.addEventListener("click", (e) => {
                if (window.innerWidth <= 768 && sidebarEl.classList.contains("show")) {
                    if (!sidebarEl.contains(e.target) && e.target !== sidebarToggleBtn) {
                        sidebarEl.classList.remove("show");
                    }
                }
            });
        }

        // Load on page ready
        loadOrders();
    </script>
  <script src="{{ url_for('static', path='js/logout.js') }}"></script>
</body>
</html>
