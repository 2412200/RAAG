<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/cart.css?v=1.0.9">
    <script src="/static/js/cart.js?v=1.0.9"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D0D0D;
            color: #F5F0ED;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .site {
            min-height: 100vh;
            background: #0D0D0D;
            display: flex;
            flex-direction: row;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #181818;
            border-right: 1px solid #8B0D1C;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: #A89B92;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: #222;
            color: #F5F0ED;
        }

        .menu-item.active {
            background: #8B0D1C;
            color: #F5F0ED;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .dashboard-title h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard-title p {
            color: #A89B92;
            font-size: 14px;
            margin-top: 4px;
        }

        .logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Mobile Nav styles */
        .mobile-navbar {
            display: none;
            background: #181818;
            border-bottom: 1px solid #8B0D1C;
            padding: 10px 20px;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .mobile-navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 2px;
        }

        .sidebar-toggle-btn {
            background: transparent;
            border: 1px solid #8B0D1C;
            color: #F5F0ED;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-toggle-btn:hover {
            background: #222;
        }

        .mobile-logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .mobile-logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Override style.css light modes */
        .orders-container {
            max-width: 900px;
            margin: 0;
            padding: 20px 0;
        }

        .orders-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #F5F0ED;
        }

        .orders-container h1::after {
            content: none;
        }

        .order-item {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            gap: 20px;
        }

        .order-item:hover {
            border-color: #8B0D1C !important;
        }

        .order-item img {
            border-radius: 8px;
            border: 1px solid #222;
        }

        .order-info h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
        }

        .order-info p {
            color: #A89B92;
        }

        .order-price {
            color: #D4A847;
        }

        .remove-btn {
            border-color: #8B0D1C !important;
            color: #E8293F !important;
            border-radius: 8px;
        }

        .remove-btn:hover {
            background: rgba(139, 13, 28, 0.2) !important;
        }

        .order-summary {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 24px;
            text-align: right;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            margin-top: 10px;
        }

        .order-summary h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
            margin-bottom: 16px;
        }

        .confirm-btn {
            background: #C0172A !important;
            color: #F5F0ED !important;
            border-radius: 8px;
        }

        .confirm-btn:hover {
            background: #E8293F !important;
            transform: translateY(-1px);
        }

        .empty-msg {
            color: #A89B92;
            margin-top: 60px;
            font-size: 16px;
        }

        footer {
            background: #181818;
            border-top: 1px solid #8B0D1C;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            color: #C0172A;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .footer-note {
            font-size: 12px;
            color: #A89B92;
        }

        /* ── RESPONSIVE MEDIA QUERIES ── */
        @media (max-width: 768px) {
            .site {
                flex-direction: column;
            }

            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 60px;
                bottom: 0;
                left: 0;
                width: 280px;
                z-index: 1001;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                min-height: calc(100vh - 60px);
            }

            .mobile-navbar {
                display: flex;
            }

            .dashboard-header {
                display: none;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                position: relative;
                padding: 16px;
            }

            .order-item img {
                width: 100%;
                height: 160px;
            }

            .remove-btn {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .order-summary {
                padding: 16px;
                text-align: center;
            }

            footer {
                padding: 1.25rem 1rem;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>

<body>
  <!-- Mobile Navbar -->
  <div class="mobile-navbar">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">☰</button>
    <div class="mobile-navbar-brand">RAAG</div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button id="mobile-cart-toggle" class="sidebar-toggle-btn" style="position: relative; border: none; font-size: 18px;" aria-label="Toggle Cart">
        🛒<span id="mobile-cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; display: none;">0</span>
      </button>
      <a href="/logout" class="mobile-logout-btn">Logout</a>
    </div>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">RAAG</div>
        <nav class="sidebar-menu">
          <a href="/home" id="nav-home" class="menu-item">
            Home
          </a>
          <a href="/orders" id="nav-orders" class="menu-item">
            My Orders
          </a>
        </nav>
      </div>
      <div id="sidebar-cart" class="sidebar-cart"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="dashboard-title">
          <h1>My Orders</h1>
          <p>Manage your pending and confirmed orders</p>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
      </header>

      <div class="orders-container">
        <div id="history-view">
            <div id="history-list"></div>
            <div id="history-empty-msg" class="empty-msg" style="display:block;">You have not placed any orders yet.</div>
        </div>
      </div>

      <footer>
        <span class="footer-brand">RAAG.COM</span>
        <span class="footer-note">© 2026 Raag. All rights reserved.</span>
      </footer>
    </main>
  </div>

    <script>
        async function loadOrderHistory() {
            const list = document.getElementById('history-list');
            const emptyMsg = document.getElementById('history-empty-msg');
            
            list.innerHTML = '<div style="color:#A89B92; text-align:center; padding: 20px;">Loading order history...</div>';
            emptyMsg.style.display = 'none';
            
            try {
                const res = await fetch('/GET/buyer/orders');
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                const orders = data.orders || [];
                
                list.innerHTML = '';
                
                if (orders.length === 0) {
                    emptyMsg.style.display = 'block';
                    return;
                }
                
                orders.forEach(order => {
                    let itemsHtml = '';
                    order.products.forEach(item => {
                        itemsHtml += `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                                <span style="color:#F5F0ED;">${item.product_name} <span style="color:#A89B92;">x ${item.quantity}</span></span>
                                <span style="color:#D4A847;">₹${(item.price * item.quantity).toLocaleString()}</span>
                            </div>
                        `;
                    });
                    
                    let statusColor = '#D4A847'; // pending
                    if (order.order_status === 'Shipped' || order.order_status === 'Processing') statusColor = '#3a86ff';
                    if (order.order_status === 'Completed' || order.order_status === 'Delivered') statusColor = '#06d6a0';
                    if (order.order_status === 'Cancelled') statusColor = '#e63946';
                    
                    list.innerHTML += `
                        <div class="order-item" style="flex-direction:column; align-items:stretch; border:1px solid #222; border-radius:12px; padding:20px; background:#181818; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.25);">
                            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:12px; font-size:12px; color:#A89B92;">
                                <span>Order ID: <strong>${order._id}</strong></span>
                                <span>Date: ${order.created_at || ''}</span>
                            </div>
                            <div style="margin-bottom:12px;">
                                ${itemsHtml}
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #333; padding-top:12px; margin-top:8px;">
                                <div>
                                    <span style="font-size:12px; color:#A89B92;">Status:</span>
                                    <span style="font-size:12px; font-weight:600; color:${statusColor}; background:rgba(0,0,0,0.3); padding:4px 8px; border-radius:4px; margin-left:6px; text-transform:uppercase;">${order.order_status}</span>
                                </div>
                                <div style="font-size:16px; font-weight:700; color:#F5F0ED;">Total: ₹${order.total_amount.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                list.innerHTML = '<div style="color:#E8293F; text-align:center; padding: 20px;">Failed to load order history.</div>';
            }
        }

        // Load order history on ready
        document.addEventListener('DOMContentLoaded', () => {
            loadOrderHistory();
        });
    </script>
  <script src="{{ url_for('static', path='js/logout.js') }}"></script>
</body>
</html>
