<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/cart.css?v=1.0.9">
    <script src="/static/js/cart.js?v=1.0.9"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D0D0D;
            color: #F5F0ED;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .site {
            min-height: 100vh;
            background: #0D0D0D;
            display: flex;
            flex-direction: row;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #181818;
            border-right: 1px solid #8B0D1C;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: #A89B92;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: #222;
            color: #F5F0ED;
        }

        .menu-item.active {
            background: #8B0D1C;
            color: #F5F0ED;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .dashboard-title h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard-title p {
            color: #A89B92;
            font-size: 14px;
            margin-top: 4px;
        }

        .logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Mobile Nav styles */
        .mobile-navbar {
            display: none;
            background: #181818;
            border-bottom: 1px solid #8B0D1C;
            padding: 10px 20px;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .mobile-navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 2px;
        }

        .sidebar-toggle-btn {
            background: transparent;
            border: 1px solid #8B0D1C;
            color: #F5F0ED;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-toggle-btn:hover {
            background: #222;
        }

        .mobile-logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .mobile-logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Override style.css light modes */
        .orders-container {
            max-width: 100%;
            margin: 0;
            padding: 20px 0;
        }

        /* Tabs Container */
        .orders-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #222;
            padding-bottom: 12px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #333;
            color: #A89B92;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            border-color: #8B0D1C;
            color: #F5F0ED;
            background: rgba(139, 13, 28, 0.1);
        }

        .tab-btn.active {
            background: #8B0D1C;
            border-color: #8B0D1C;
            color: #F5F0ED;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(139, 13, 28, 0.3);
        }

        .tab-count {
            background: rgba(0, 0, 0, 0.4);
            color: #F5F0ED;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Table Styling */
        .orders-table-container {
            width: 100%;
            overflow-x: auto;
            background: #181818;
            border: 1px solid #222;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            margin-bottom: 30px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        .orders-table th {
            background: #1f1f1f;
            color: #F5F0ED;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .orders-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #222;
            color: #A89B92;
            vertical-align: middle;
        }

        .orders-table tr:last-child td {
            border-bottom: none;
        }

        /* Highlight Row on Hover */
        .orders-table tbody tr:hover td {
            color: #F5F0ED;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Group border separator */
        .order-group-start td {
            border-top: 2px solid #8B0D1C !important;
        }

        /* Empty message */
        .empty-msg {
            display: none;
            text-align: center;
            padding: 40px;
            color: #A89B92;
            font-size: 15px;
        }

        footer {
            background: #181818;
            border-top: 1px solid #8B0D1C;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            color: #C0172A;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .footer-note {
            font-size: 12px;
            color: #A89B92;
        }

        /* ── RESPONSIVE MEDIA QUERIES ── */
        @media (max-width: 768px) {
            .site {
                flex-direction: column;
            }

            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 60px;
                bottom: 0;
                left: 0;
                width: 280px;
                z-index: 1001;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                min-height: calc(100vh - 60px);
            }

            .mobile-navbar {
                display: flex;
            }

            .dashboard-header {
                display: none;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                position: relative;
                padding: 16px;
            }

            .order-item img {
                width: 100%;
                height: 160px;
            }

            .remove-btn {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .order-summary {
                padding: 16px;
                text-align: center;
            }

            footer {
                padding: 1.25rem 1rem;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        /* Order Status Badges */
        .order-status-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 6px;
            text-align: center;
        }

        .order-status-badge.pending {
            color: #ffb703;
            background: rgba(255, 183, 3, 0.1);
            border: 1px solid rgba(255, 183, 3, 0.3);
        }

        .order-status-badge.processing {
            color: #D4A847;
            background: rgba(212, 168, 71, 0.1);
            border: 1px solid rgba(212, 168, 71, 0.3);
        }

        .order-status-badge.completed {
            color: #06d6a0;
            background: rgba(6, 214, 160, 0.1);
            border: 1px solid rgba(6, 214, 160, 0.3);
        }

        .order-status-badge.cancelled {
            color: #e8293f;
            background: rgba(232, 41, 63, 0.1);
            border: 1px solid rgba(232, 41, 63, 0.3);
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>

<body>
  <!-- Mobile Navbar -->
  <div class="mobile-navbar">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">☰</button>
    <div class="mobile-navbar-brand">RAAG</div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button id="mobile-cart-toggle" class="sidebar-toggle-btn" style="position: relative; border: none; font-size: 18px;" aria-label="Toggle Cart">
        🛒<span id="mobile-cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; display: none;">0</span>
      </button>
      <a href="/logout" class="mobile-logout-btn">Logout</a>
    </div>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">RAAG</div>
        <nav class="sidebar-menu">
          <a href="/home" id="nav-home" class="menu-item">
            Home
          </a>
          <a href="/orders" id="nav-orders" class="menu-item">
            My Orders
          </a>
        </nav>
      </div>
      <div id="sidebar-cart" class="sidebar-cart"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="dashboard-title">
          <h1>My Orders</h1>
          <p>Manage your pending and confirmed orders</p>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
      </header>

      <div class="orders-container" style="width: 100%; max-width: 100%;">
        <!-- Card-based Orders List -->
        <div id="orders-list-container" style="display: flex; flex-direction: column; gap: 24px; margin-top: 10px; margin-bottom: 40px; width: 100%;">
            <!-- Loaded dynamically -->
        </div>
        <div id="orders-empty-msg" class="empty-msg" style="text-align: center; padding: 40px; color: #A89B92; font-size: 15px; display: none;">No orders found.</div>
      </div>

      <footer>
        <span class="footer-brand">RAAG.COM</span>
        <span class="footer-note">© 2026 Raag. All rights reserved.</span>
      </footer>
    </main>
  </div>

    <script>
        let allOrders = [];
        let currentTab = 'pending';

        function getOrderDetails(createdAtStr) {
            let orderDate = 'N/A';
            let orderTime = 'N/A';
            let dispatchDateStr = 'N/A';
            
            if (!createdAtStr) return { orderDate, orderTime, dispatchDateStr };

            try {
                // createdAtStr format: YYYY-MM-DD HH:MM
                const parts = createdAtStr.trim().split(' ');
                if (parts.length >= 2) {
                    orderDate = parts[0];
                    orderTime = parts[1];
                    
                    const dateParts = orderDate.split('-');
                    const timeParts = orderTime.split(':');
                    
                    if (dateParts.length === 3 && timeParts.length >= 2) {
                        const year = parseInt(dateParts[0]);
                        const month = parseInt(dateParts[1]) - 1;
                        const day = parseInt(dateParts[2]);
                        const hour = parseInt(timeParts[0]);
                        const minute = parseInt(timeParts[1]);
                        
                        const dateObj = new Date(year, month, day, hour, minute);
                        
                        let dispatchDate = new Date(dateObj.getTime());
                        if (hour < 15) {
                            dispatchDate.setDate(dispatchDate.getDate() + 1);
                        } else {
                            dispatchDate.setDate(dispatchDate.getDate() + 2);
                        }
                        
                        const dYear = dispatchDate.getFullYear();
                        const dMonth = String(dispatchDate.getMonth() + 1).padStart(2, '0');
                        const dDay = String(dispatchDate.getDate()).padStart(2, '0');
                        dispatchDateStr = `${dYear}-${dMonth}-${dDay}`;
                    }
                } else {
                    const dateObj = new Date(createdAtStr);
                    if (!isNaN(dateObj.getTime())) {
                        const year = dateObj.getFullYear();
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        const day = String(dateObj.getDate()).padStart(2, '0');
                        orderDate = `${year}-${month}-${day}`;
                        
                        const hour = dateObj.getHours();
                        const minute = String(dateObj.getMinutes()).padStart(2, '0');
                        orderTime = `${String(hour).padStart(2, '0')}:${minute}`;
                        
                        let dispatchDate = new Date(dateObj.getTime());
                        if (hour < 15) {
                            dispatchDate.setDate(dispatchDate.getDate() + 1);
                        } else {
                            dispatchDate.setDate(dispatchDate.getDate() + 2);
                        }
                        
                        const dYear = dispatchDate.getFullYear();
                        const dMonth = String(dispatchDate.getMonth() + 1).padStart(2, '0');
                        const dDay = String(dispatchDate.getDate()).padStart(2, '0');
                        dispatchDateStr = `${dYear}-${dMonth}-${dDay}`;
                    }
                }
            } catch (e) {
                console.error("Error parsing order datetime:", e);
            }
            
            return { orderDate, orderTime, dispatchDateStr };
        }

        async function loadOrderHistory() {
            const listContainer = document.getElementById('orders-list-container');
            const emptyMsg = document.getElementById('orders-empty-msg');
            
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color:#A89B92;">Loading order history...</div>';
            emptyMsg.style.display = 'none';
            
            try {
                const res = await fetch('/GET/buyer/orders');
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                allOrders = data.orders || [];
                
                renderOrdersTable();
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color:#E8293F;">Failed to load order history.</div>';
            }
        }

        function renderOrdersTable() {
            const listContainer = document.getElementById('orders-list-container');
            const emptyMsg = document.getElementById('orders-empty-msg');
            listContainer.innerHTML = '';
            
            if (allOrders.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';

            allOrders.forEach((order) => {
                const products = order.products || [];
                const { orderDate, orderTime, dispatchDateStr } = getOrderDetails(order.created_at);

                const card = document.createElement('div');
                card.style.cssText = `
                    background: #181818;
                    border: 1px solid #222;
                    border-radius: 12px;
                    overflow: hidden;
                    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
                    width: 100%;
                `;

                // Header section
                const headerHtml = `
                    <div style="background: #1f1f1f; padding: 16px 24px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
                            <div>
                                <div style="font-size: 11px; color: #A89B92; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px;">Order Placed</div>
                                <div style="font-size: 14px; color: #F5F0ED; font-weight: 500;">${orderDate} ${orderTime}</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #A89B92; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px;">Total</div>
                                <div style="font-size: 14px; color: #D4A847; font-weight: 600;">₹${order.total_amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #A89B92; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px;">Ship To</div>
                                <div style="font-size: 14px; color: #F5F0ED; font-weight: 500;">${order.customer_name || 'Buyer'}</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 11px; color: #A89B92; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; font-family: monospace;">Order # ${order._id}</div>
                        </div>
                    </div>
                `;

                // Body section (Products)
                let productsHtml = '<div style="padding: 24px; display: flex; flex-direction: column; gap: 20px;">';
                products.forEach((prod) => {
                    const prodId = prod.product_id || 'N/A';
                    const prodTotal = prod.price * prod.quantity;
                    const imageSrc = prod.image && (prod.image.startsWith('http://') || prod.image.startsWith('https://')) ? prod.image : (prod.image ? `/static/images/${prod.image}` : '/static/images/default.webp');

                    productsHtml += `
                        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; padding-bottom: 20px; border-bottom: 1px dashed #222;">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <img src="${imageSrc}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #222;" onerror="this.onerror=null;this.src='/static/images/default.webp'">
                                <div>
                                    <a href="/search?q=${encodeURIComponent(prod.product_name)}" style="color: #F5F0ED; font-weight: 600; text-decoration: none; font-size: 15px; display: block; margin-bottom: 4px; transition: color 0.2s;" onmouseover="this.style.color='#E8293F'" onmouseout="this.style.color='#F5F0ED'">
                                        ${prod.product_name}
                                    </a>
                                    <div style="font-size: 12px; color: #A89B92;">Product ID: <span style="font-family: monospace;">${prodId}</span></div>
                                    <div style="font-size: 13px; color: #A89B92; margin-top: 6px;">
                                        Qty: <strong style="color:#F5F0ED;">${prod.quantity}</strong> &nbsp;|&nbsp; Price: <strong style="color:#F5F0ED;">₹${prod.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</strong>
                                    </div>
                                </div>
                            </div>
                            <div style="text-align: right; min-width: 120px;">
                                <div style="font-size: 11px; color: #A89B92; text-transform: uppercase; margin-bottom: 4px;">Item Total</div>
                                <div style="font-size: 15px; color: #D4A847; font-weight: 600;">₹${prodTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                <button onclick="window.location.href='/search?q=${encodeURIComponent(prod.product_name)}'" style="margin-top: 10px; background: transparent; border: 1px solid #333; color: #F5F0ED; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.borderColor='#8B0D1C';this.style.color='#E8293F'" onmouseout="this.style.borderColor='#333';this.style.color='#F5F0ED'">
                                    Buy it again
                                </button>
                            </div>
                        </div>
                    `;
                });



                productsHtml += '</div>';

                card.innerHTML = headerHtml + productsHtml;
                listContainer.appendChild(card);
            });
        }

        // Load order history on ready
        document.addEventListener('DOMContentLoaded', () => {
            loadOrderHistory();
        });
    </script>
  <script src="{{ url_for('static', path='js/logout.js') }}"></script>
</body>
</html>
