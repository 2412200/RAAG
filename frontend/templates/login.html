<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAAG — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1e1e1e;
      --border-active: #3a1a1a;
      --accent: #e03030;
      --accent-dim: rgba(224, 48, 48, 0.12);
      --text: #f0f0f0;
      --muted: #555555;
      --error: #ff6b6b;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
    }

    .panel--form {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 40px;
      width: 100%;
    }

    .form {
      width: 100%;
      max-width: 480px;
      padding: 20px 0;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form>* {
      animation: fadeUp 0.4s ease both;
    }

    .form>*:nth-child(1) {
      animation-delay: 0.05s;
    }

    .form>*:nth-child(2) {
      animation-delay: 0.10s;
    }

    .form>*:nth-child(3) {
      animation-delay: 0.15s;
    }

    .form>*:nth-child(4) {
      animation-delay: 0.20s;
    }

    .form>*:nth-child(5) {
      animation-delay: 0.25s;
    }

    .overline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
    }

    .display {
      font-family: var(--font-display);
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .form-head {
      margin-bottom: 32px;
    }

    .form-head .display {
      margin: 8px 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    /* Role toggle */
    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .role-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text);
    }

    .role-btn:hover {
      border-color: var(--border-active);
    }

    .role-btn.is-active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .role-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    .role-btn.is-active .role-num {
      color: var(--accent);
    }

    .role-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .role-tag {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .field input::placeholder {
      color: #333;
    }

    .field input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(224, 48, 48, 0.08);
    }

    .field input.is-invalid {
      border-color: var(--error);
    }

    .field-error {
      font-size: 11px;
      color: var(--error);
      font-family: var(--font-mono);
      min-height: 16px;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .link-btn:hover {
      color: var(--text);
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }

    .checkbox input {
      display: none;
    }

    .check-box {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .checkbox input:checked+.check-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox input:checked+.check-box::after {
      content: '✓';
      font-size: 10px;
      color: #fff;
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .link:hover {
      text-decoration: underline;
    }

    .link--strong {
      font-weight: 600;
    }

    .cta {
      width: 100%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .cta:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .status.is-error {
      background: rgba(255, 107, 107, 0.1);
      color: var(--error);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    .status.is-success {
      background: rgba(224, 48, 48, 0.1);
      color: var(--accent);
      border: 1px solid rgba(224, 48, 48, 0.2);
    }

    .form-foot {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .panel--form {
        padding: 32px 20px;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
</head>

<body>
  <main class="page">
    <section class="panel--form">
      <form id="login-form" class="form" novalidate>

        <div class="form-head">
          <span class="overline"></span>
          <h1 class="display">Sign IN.</h1>
          <p class="subtitle">Choose your profile to continue.</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" role="tablist" aria-label="Select profile">
          <button type="button" class="role-btn is-active" data-role="seller" role="tab" aria-selected="true">
            <span class="role-num">01</span>
            <span class="role-name">Seller</span>
          </button>
          <button type="button" class="role-btn" data-role="buyer" role="tab" aria-selected="false">
            <span class="role-num">02</span>
            <span class="role-name">Buyer</span>
          </button>
        </div>

        <label class="field">
          <span class="field-label">Phone Number</span>
          <input id="number" name="number" type="tel" required placeholder="94xxxxxx90" />
          <span class="field-error" id="number-error"></span>
        </label>

        <label class="field">
          <span class="field-label">
            Password
            <button type="button" id="toggle-password" class="link-btn" aria-label="Show password">show</button>
          </span>
          <input id="password" name="password" type="password" autocomplete="current-password" required minlength="6"
            placeholder="••••••••" />
          <span class="field-error" id="password-error"></span>
        </label>

        <div class="row-between">
          <label class="checkbox">
            <input type="checkbox" id="remember" />
            <span class="check-box"></span>
            <span>Keep me signed in</span>
          </label>
          <a href="/forgot-password" class="link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="cta">
          <span class="cta-label">Sign in as <span id="role-display">Seller</span></span>
          <span class="cta-arrow">→</span>
        </button>

        <!-- Status -->
        <div id="status" class="status" hidden></div>

        <p class="form-foot">
          New here?
          <a href="/signup" class="link link--strong">Open an account →</a>
        </p>

      </form>
    </section>
  </main>

  <script>

    // Clear any token from localStorage when visiting the login page
    localStorage.removeItem("token");

    let selectedRole = "seller";

    // Handle password visibility toggle
    const togglePwBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');

    if (togglePwBtn && passwordInput) {
      togglePwBtn.addEventListener('click', () => {
        const isPw = passwordInput.type === 'password';
        passwordInput.type = isPw ? 'text' : 'password';
        togglePwBtn.textContent = isPw ? 'hide' : 'show';
        togglePwBtn.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
      });
    }

    document.querySelectorAll('.role-btn').forEach((btn) => {

      btn.addEventListener('click', () => {

        document.querySelectorAll('.role-btn').forEach((b) => {

          b.classList.remove('is-active');
          b.setAttribute('aria-selected', 'false');

        });

        btn.classList.add('is-active');
        btn.setAttribute('aria-selected', 'true');

        selectedRole = btn.dataset.role;

        document.getElementById('role-display').textContent =
          selectedRole.charAt(0).toUpperCase() +
          selectedRole.slice(1);
      });

    });

    document
      .getElementById("login-form")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const phone =
          document.getElementById("number").value;

        const password =
          document.getElementById("password").value;

        const payload = {
          phone: phone,
          password: password,
          role: selectedRole
        };

        const statusDiv = document.getElementById("status");
        statusDiv.hidden = true;

        try {

          const response = await fetch(
            "/POST/login",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify(payload)
            }
          );

          const data = await response.json();

          if (!response.ok) {
            statusDiv.className = "status is-error";
            statusDiv.textContent = data.detail || "Invalid credentials";
            statusDiv.hidden = false;
            return;
          }

          // Save JWT in localStorage (optional)
          if (data.token) {
            localStorage.setItem(
              "token",
              data.token
            );
          }

          // Redirect based on role
          if (data.role === "seller") {

            window.location.href =
              "/seller";

          } else {

            window.location.href =
              "/home";

          }

        } catch (error) {

          console.error(error);
          statusDiv.className = "status is-error";
          statusDiv.textContent = "Unable to connect to server";
          statusDiv.hidden = false;

        }

      });

  </script>
</body>

</html>
