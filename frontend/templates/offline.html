<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Offline — RAAG</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #0D0D0D;
            --bg-card: #181818;
            --border-color: #222;
            --primary: #E8293F;
            --accent-gold: #D4A847;
            --success-green: #10B981;
            --text-main: #F5F0ED;
            --text-muted: #A89B92;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .visual-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .visual-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-gold);
        }

        .offline-illustration {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(212, 168, 71, 0.05);
            color: var(--accent-gold);
            border: 1px solid rgba(212, 168, 71, 0.1);
            animation: pulse-gold 2s infinite;
        }

        .offline-illustration svg {
            width: 48px;
            height: 48px;
            stroke-width: 1.5;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 168, 71, 0.3); }
            70% { box-shadow: 0 0 0 15px rgba(212, 168, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 168, 71, 0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-action:hover {
            background: #222;
            border-color: #555;
        }

        .btn-action.connected {
            background: var(--success-green);
            color: #fff;
            border-color: var(--success-green);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Spinner for connection checking */
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-right-color: currentColor;
            border-radius: 50%;
            margin-right: 10px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">RAAG</div>
        <div style="font-size: 13px; color: var(--text-muted);">Connection Manager</div>
    </header>

    <div class="container">
        <div class="visual-card">
            <div class="offline-illustration">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 1l22 22"></path>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
                    <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
                    <path d="M8.53 16.03a6 6 0 0 1 3.5-1.5"></path>
                    <path d="M16.24 16.24a6 6 0 0 1-1.24.81"></path>
                    <path d="M12 20h.01"></path>
                </svg>
            </div>
            <h1>Connection Lost</h1>
            <p>We are unable to connect to the RAAG servers. Please check your network cables, router configuration, or Wi-Fi connection.</p>
            
            <button id="retry-btn" class="btn-action" onclick="verifyNetwork()">
                <span id="btn-spinner" class="btn-spinner"></span>
                <span id="btn-text">Check Connection</span>
            </button>
        </div>
    </div>

    <footer>
        <span>RAAG.COM</span>
        <span>© 2026 Raag. All rights reserved.</span>
    </footer>

    <script>
        function verifyNetwork() {
            const btn = document.getElementById('retry-btn');
            const spinner = document.getElementById('btn-spinner');
            const text = document.getElementById('btn-text');

            // Setup loading state
            spinner.style.display = 'inline-block';
            text.textContent = 'Verifying connection...';
            btn.disabled = true;

            setTimeout(() => {
                // Simulate check
                if (navigator.onLine) {
                    btn.className = 'btn-action connected';
                    spinner.style.display = 'none';
                    text.textContent = 'Connection Secured!';
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 1200);
                } else {
                    spinner.style.display = 'none';
                    text.textContent = 'Still Offline. Retry Check';
                    btn.disabled = false;
                }
            }, 1800);
        }

        // Automatic checking
        window.addEventListener('online', () => {
            const btn = document.getElementById('retry-btn');
            const text = document.getElementById('btn-text');
            btn.className = 'btn-action connected';
            text.textContent = 'Online! Redirecting...';
            setTimeout(() => {
                window.location.href = '/home';
            }, 1000);
        });
    </script>
</body>
</html>
