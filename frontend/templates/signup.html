<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAAG — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1e1e1e;
      --border-active: #3a1a1a;
      --accent: #e03030;
      --accent-dim: rgba(224, 48, 48, 0.12);
      --text: #f0f0f0;
      --muted: #555555;
      --error: #ff6b6b;
      --success: #e03030;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── GRID BACKGROUND ── */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(224, 48, 48, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224, 48, 48, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── BRAND PANEL ── */
    .panel--brand {
      position: relative;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      overflow: hidden;
    }

    .panel--brand::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(224, 48, 48, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.1em;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border: 2px solid var(--accent);
      transform: rotate(45deg);
      position: relative;
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: var(--accent);
      transform: rotate(0deg);
    }

    .overline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 8px;
      display: block;
    }

    .brand-copy {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0;
    }

    .display {
      font-family: var(--font-display);
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .accent {
      color: var(--accent);
    }

    .brand-copy p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 320px;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 48px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .step.is-active {
      opacity: 1;
    }

    .step.is-done {
      opacity: 0.7;
    }

    .step-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-active);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step.is-active .step-num {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .step.is-done .step-num {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .step-label {
      font-size: 13px;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    .brand-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .brand-meta div {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .dot {
      color: #e03030;
    }

    /* ── FORM PANEL ── */
    .panel--form {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 40px;
      width: 100%;
    }

    .form {
      width: 100%;
      max-width: 480px;
      padding: 20px 0;
    }

    .form-head {
      margin-bottom: 32px;
    }

    .form-head .display {
      font-size: clamp(28px, 3vw, 42px);
      margin: 8px 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    /* Role toggle */
    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .role-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text);
    }

    .role-btn:hover {
      border-color: var(--border-active);
    }

    .role-btn.is-active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .role-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    .role-btn.is-active .role-num {
      color: var(--accent);
    }

    .role-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .role-tag {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Fields */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field input,
    .field select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    #gst_pan {
      text-transform: uppercase;
    }

    .field input::placeholder {
      color: #333;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(224, 48, 48, 0.08);
    }

    .field input.is-invalid,
    .field select.is-invalid {
      border-color: var(--error);
    }

    .field.has-error input,
    .field.has-error select {
      border-color: var(--error);
    }

    .field-error {
      font-size: 11px;
      color: var(--error);
      font-family: var(--font-mono);
      min-height: 16px;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .link-btn:hover {
      color: var(--text);
    }



    /* CTA button */
    .cta {
      width: 100%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .cta:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .status.is-error {
      background: rgba(255, 77, 77, 0.1);
      color: var(--error);
      border: 1px solid rgba(255, 77, 77, 0.2);
    }

    .status.is-success {
      background: rgba(71, 255, 178, 0.1);
      color: var(--success);
      border: 1px solid rgba(71, 255, 178, 0.2);
    }

    .form-foot {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .link:hover {
      text-decoration: underline;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form>* {
      animation: fadeUp 0.4s ease both;
    }

    .form>*:nth-child(1) {
      animation-delay: 0.05s;
    }

    .form>*:nth-child(2) {
      animation-delay: 0.10s;
    }

    .form>*:nth-child(3) {
      animation-delay: 0.15s;
    }

    .form>*:nth-child(4) {
      animation-delay: 0.20s;
    }

    .form>*:nth-child(5) {
      animation-delay: 0.25s;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
      }

      .panel--brand {
        display: none;
      }

      .panel--form {
        padding: 32px 20px;
      }

      .fields-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>

<body>
  <main class="page">

    <!-- RIGHT PANEL -->
    <section class="panel--form">
      <form id="signup-form" class="form" novalidate>

        <div class="form-head">
          <span class="overline">[ 02 / CREATE ACCOUNT ]</span>
          <h1 class="display">Register.</h1>
          <p class="subtitle">Set up your verified trade profile.</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" role="tablist" aria-label="Select role">
          <button type="button" class="role-btn is-active" data-role="seller" role="tab" aria-selected="true">
            <span class="role-num">01</span>
            <span class="role-name">Seller</span>
          </button>
          <button type="button" class="role-btn" data-role="buyer" role="tab" aria-selected="false">
            <span class="role-num">02</span>
            <span class="role-name">Buyer</span>
          </button>
        </div>

        <div class="divider"><span>COMPANY INFO</span></div>

        <!-- Fields grid -->
        <div class="fields-grid">

          <!-- Company Name -->
          <label class="field field-full">
            <span class="field-label" id="business-label"> Company Name </span>
            <input id="company_name" placeholder="Acme Industries Ltd." required />
            <span class="field-error" id="company-error"></span>
          </label>

          <!-- Owner Name -->
          <label class="field field-full">
            <span class="field-label">Owner Name</span>
            <input id="owner_name" name="owner_name" type="text" placeholder="John Doe" required />
            <span class="field-error" id="owner-error"></span>
          </label>

          <!-- Phone -->
          <label class="field">
            <span class="field-label">Phone Number</span>
            <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" required />
            <span class="field-error" id="phone-error"></span>
          </label>

          <!-- City -->
          <label class="field">
            <span class="field-label">City</span>
            <input id="city" name="city" type="text" placeholder="New Delhi" required />
            <span class="field-error" id="city-error"></span>
          </label>

          <!-- State -->
          <label class="field">
            <span class="field-label">State / UT</span>
            <select id="state" name="state" required>
              <option value="" disabled selected>Select State / UT</option>
              <option value="Andhra Pradesh">Andhra Pradesh</option>
              <option value="Arunachal Pradesh">Arunachal Pradesh</option>
              <option value="Assam">Assam</option>
              <option value="Bihar">Bihar</option>
              <option value="Chhattisgarh">Chhattisgarh</option>
              <option value="Goa">Goa</option>
              <option value="Gujarat">Gujarat</option>
              <option value="Haryana">Haryana</option>
              <option value="Himachal Pradesh">Himachal Pradesh</option>
              <option value="Jharkhand">Jharkhand</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Kerala">Kerala</option>
              <option value="Madhya Pradesh">Madhya Pradesh</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Manipur">Manipur</option>
              <option value="Meghalaya">Meghalaya</option>
              <option value="Mizoram">Mizoram</option>
              <option value="Nagaland">Nagaland</option>
              <option value="Odisha">Odisha</option>
              <option value="Punjab">Punjab</option>
              <option value="Rajasthan">Rajasthan</option>
              <option value="Sikkim">Sikkim</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Telangana">Telangana</option>
              <option value="Tripura">Tripura</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Uttarakhand">Uttarakhand</option>
              <option value="West Bengal">West Bengal</option>
              <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
              <option value="Chandigarh">Chandigarh</option>
              <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
              <option value="Delhi">Delhi</option>
              <option value="Jammu and Kashmir">Jammu and Kashmir</option>
              <option value="Ladakh">Ladakh</option>
              <option value="Lakshadweep">Lakshadweep</option>
              <option value="Puducherry">Puducherry</option>
            </select>
            <span class="field-error" id="state-error"></span>
          </label>

          <!-- Category -->
          <label class="field">
            <span class="field-label">Category</span>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select Category</option>
              <option value="home appliances">Home Appliances</option>
              <option value="apparels">Apparels</option>
              <option value="pharmacy">Pharmacy</option>
              <option value="steel work">Steel Work</option>
              <option value="fmcg">FMCG</option>
            </select>
            <span class="field-error" id="category-error"></span>
          </label>

          <!-- Seller Only Fields -->
          <div id="seller-only-fields" style="display: contents;">
            <!-- GST/PAN Number -->
            <label class="field">
              <span class="field-label">GST / PAN Number(optional)</span>
              <input id="gst_pan" name="gst_pan" type="text" placeholder="22AAAAA0000A1Z5 / ABCDE1234F" optional />
              <span class="field-error" id="gst_pan-error"></span>
            </label>
          </div>

        </div>

        <div class="divider"><span>CREDENTIALS</span></div>

        <div class="fields-grid">

          <!-- Password -->
          <label class="field">
            <span class="field-label">
              Password
              <button type="button" id="toggle-password" class="link-btn" aria-label="Show password">show</button>
            </span>
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />

            <span class="field-error" id="password-error"></span>
          </label>

          <!-- Confirm Password -->
          <label class="field">
            <span class="field-label">Confirm Password</span>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="••••••••" required />
            <span class="field-error" id="confirm-error"></span>
          </label>

        </div>

        <!-- OTP Container -->
        <div id="otp-container" class="fields-grid" style="display: none; margin-top: 16px;">
          <label class="field field-full">
            <span class="field-label">Verification Code (OTP)</span>
            <input id="otp" name="otp" type="text" placeholder="Enter OTP code" maxlength="6" autocomplete="one-time-code" />
            <span class="field-error" id="otp-error"></span>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="cta">
          <span class="cta-label">Create <span id="role-display">Seller</span> Account</span>
          <span>→</span>
        </button>

        <!-- Status -->
        <div id="status" class="status" hidden></div>

        <p class="form-foot">
          Already have an account?
          <a href="/" class="link">Sign in →</a>
        </p>

      </form>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      // Clear any token from localStorage when visiting the signup page
      localStorage.removeItem("token");

      const form = document.getElementById('signup-form');
      const roleButtons = document.querySelectorAll('.role-btn');
      const roleDisplay = document.getElementById('role-display');
      const submitBtn = document.getElementById('submit-btn');
      const status = document.getElementById('status');

      const togglePwBtn = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');

      const companyInput = document.getElementById('company_name');
      const businessLabel = document.getElementById('business-label');
      const ownerInput = document.getElementById('owner_name');
      const sellerOnlyFields = document.getElementById('seller-only-fields');
      const gstInput = document.getElementById('gst_pan');

      // Auto-capitalize GST/PAN input value
      gstInput.addEventListener('input', () => {
        gstInput.value = gstInput.value.toUpperCase();
      });

      let selectedRole = 'seller';

      // ------------------------------
      // Role Toggle
      // ------------------------------
      roleButtons.forEach(btn => {
        btn.addEventListener('click', () => {

          roleButtons.forEach(b => {
            b.classList.remove('is-active');
            b.setAttribute('aria-selected', 'false');
          });

          btn.classList.add('is-active');
          btn.setAttribute('aria-selected', 'true');

          selectedRole = btn.dataset.role;

          roleDisplay.textContent =
            selectedRole.charAt(0).toUpperCase() +
            selectedRole.slice(1);

          if (selectedRole === "seller") {

            businessLabel.textContent = "Company Name";
            companyInput.placeholder = "Acme Industries Ltd.";
            sellerOnlyFields.style.display = 'contents';

          } else {

            businessLabel.textContent = "Shop Name";
            companyInput.placeholder = "ABC Retail Store";
            sellerOnlyFields.style.display = 'none';

            // Clear seller-specific fields
            gstInput.value = '';
            setError(gstInput, 'gst_pan-error', '');
          }
        });
      });

      // ------------------------------
      // Show / Hide Password
      // ------------------------------
      togglePwBtn.addEventListener('click', () => {

        const show = passwordInput.type === 'password';

        passwordInput.type = show ? 'text' : 'password';

        togglePwBtn.textContent =
          show ? 'hide' : 'show';
      });



      // ------------------------------
      // Validation Helpers
      // ------------------------------
      function setError(inputEl, errorId, message) {

        const errorEl =
          document.getElementById(errorId);

        if (message) {

          inputEl.classList.add('is-invalid');
          errorEl.textContent = message;

        } else {

          inputEl.classList.remove('is-invalid');
          errorEl.textContent = '';
        }
      }

      function validate(checkOtpOnly = false) {
        if (checkOtpOnly) {
          const otpInput = document.getElementById('otp');
          const otpVal = otpInput.value.trim();
          if (!otpVal) {
            setError(otpInput, 'otp-error', 'Verification code is required.');
            return false;
          }
          if (!/^\d{4,8}$/.test(otpVal)) {
            setError(otpInput, 'otp-error', 'Please enter a valid OTP code.');
            return false;
          }
          setError(otpInput, 'otp-error', '');
          return true;
        }

        let valid = true;

        const company =
          companyInput.value.trim();

        const owner =
          ownerInput.value.trim();

        const phone =
          document.getElementById('phone')
            .value.trim();

        const city =
          document.getElementById('city')
            .value.trim();

        const state =
          document.getElementById('state')
            .value.trim();

        const password =
          passwordInput.value;

        const confirmPassword =
          confirmInput.value;

        // Company / Shop

        if (!company) {

          setError(
            companyInput,
            'company-error',
            selectedRole === "seller"
              ? "Company name is required."
              : "Shop name is required."
          );

          valid = false;

        } else {

          setError(
            companyInput,
            'company-error',
            ''
          );
        }

        // Owner

        if (!owner) {

          setError(
            ownerInput,
            'owner-error',
            'Owner name is required.'
          );

          valid = false;

        } else {

          setError(
            ownerInput,
            'owner-error',
            ''
          );
        }

        // Phone

        if (!phone) {

          setError(
            document.getElementById('phone'),
            'phone-error',
            'Phone number is required.'
          );

          valid = false;

        } else if (
          !/^[+\d\s\-()]{7,15}$/.test(phone)
        ) {

          setError(
            document.getElementById('phone'),
            'phone-error',
            'Enter a valid phone number.'
          );

          valid = false;

        } else {

          setError(
            document.getElementById('phone'),
            'phone-error',
            ''
          );
        }

        // City

        if (!city) {

          setError(
            document.getElementById('city'),
            'city-error',
            'City is required.'
          );

          valid = false;

        } else {

          setError(
            document.getElementById('city'),
            'city-error',
            ''
          );
        }

        // State

        if (!state) {

          setError(
            document.getElementById('state'),
            'state-error',
            'State is required.'
          );

          valid = false;

        } else {

          setError(
            document.getElementById('state'),
            'state-error',
            ''
          );
        }

        // Password

        if (!password) {

          setError(
            passwordInput,
            'password-error',
            'Password is required.'
          );

          valid = false;

        } else if (password.length < 6) {

          setError(
            passwordInput,
            'password-error',
            'Minimum 6 characters.'
          );

          valid = false;

        } else {

          setError(
            passwordInput,
            'password-error',
            ''
          );
        }

        // Confirm Password

        if (!confirmPassword) {

          setError(
            confirmInput,
            'confirm-error',
            'Confirm your password.'
          );

          valid = false;

        } else if (
          password !== confirmPassword
        ) {

          setError(
            confirmInput,
            'confirm-error',
            'Passwords do not match.'
          );

          valid = false;

        } else {

          setError(
            confirmInput,
            'confirm-error',
            ''
          );
        }

        // Category validation
        const categorySelect = document.getElementById('category');
        if (!categorySelect.value) {
          setError(categorySelect, 'category-error', 'Category is required.');
          valid = false;
        } else {
          setError(categorySelect, 'category-error', '');
        }

        // Seller fields validation
        if (selectedRole === 'seller') {
          const gstPanInput = document.getElementById('gst_pan');

          if (!gstPanInput.value.trim()) {
            setError(gstPanInput, 'gst_pan-error', 'GST / PAN number is required.');
            valid = false;
          } else {
            setError(gstPanInput, 'gst_pan-error', '');
          }
        }

        return valid;
      }

      // ------------------------------
      // Status Message
      // ------------------------------
      function showStatus(message, type) {

        status.hidden = false;

        status.className =
          `status ${type === 'success'
            ? 'is-success'
            : 'is-error'
          }`;

        status.textContent = message;
      }

      function clearStatus() {

        status.hidden = true;
        status.className = 'status';
      }

      // ------------------------------
      // Submit Form
      // ------------------------------
      let otpRequested = false;

      function toggleInputs(disabled) {
        const inputs = form.querySelectorAll('input, select, .role-btn');
        inputs.forEach(el => {
          if (el.id !== 'otp' && el.id !== 'submit-btn') {
            if (el.classList.contains('role-btn')) {
              el.style.pointerEvents = disabled ? 'none' : 'auto';
            } else {
              el.disabled = disabled;
            }
          }
        });
      }

      form.addEventListener('submit', async e => {
        e.preventDefault();
        clearStatus();

        if (!otpRequested) {
          if (!validate(false)) return;

          submitBtn.disabled = true;
          submitBtn.querySelector('.cta-label').textContent = 'Sending verification code...';

          const payload = {
            business_name: companyInput.value.trim(),
            owner_name: ownerInput.value.trim(),
            phone: document.getElementById('phone').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value.trim(),
            password: passwordInput.value,
            role: selectedRole,
            gst_pan: selectedRole === 'seller' ? document.getElementById('gst_pan').value.trim() : null,
            category: document.getElementById('category').value
          };

          try {
            const response = await fetch('/POST/request-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
              showStatus(data.detail || 'Failed to send OTP.', 'error');
              return;
            }

            otpRequested = true;
            document.getElementById('otp-container').style.display = 'block';
            document.getElementById('otp').focus();
            toggleInputs(true);
            submitBtn.querySelector('.cta-label').textContent = 'Verify & Create Account';
            showStatus('Verification code sent to your phone number!', 'success');

          } catch (error) {
            console.error(error);
            showStatus('Network error requesting OTP.', 'error');
          } finally {
            submitBtn.disabled = false;
          }

        } else {
          if (!validate(true)) return;

          submitBtn.disabled = true;
          submitBtn.querySelector('.cta-label').textContent = 'Verifying account...';

          const payload = {
            business_name: companyInput.value.trim(),
            owner_name: ownerInput.value.trim(),
            phone: document.getElementById('phone').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value.trim(),
            password: passwordInput.value,
            role: selectedRole,
            gst_pan: selectedRole === 'seller' ? document.getElementById('gst_pan').value.trim() : null,
            category: document.getElementById('category').value,
            otp: document.getElementById('otp').value.trim()
          };

          try {
            const response = await fetch('/POST/signup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
              showStatus(data.detail || 'Signup failed.', 'error');
              return;
            }

            showStatus('Account created successfully! Logging you in...', 'success');
            
            if (data.token) {
              localStorage.setItem("token", data.token);
            }

            setTimeout(() => {
              if (data.role === 'seller') {
                window.location.href = '/seller';
              } else {
                window.location.href = '/home';
              }
            }, 1500);

          } catch (error) {
            console.error(error);
            showStatus('Network error.', 'error');
          } finally {
            submitBtn.disabled = false;
          }
        }
      });

    })();
  </script>
</body>

</html>
