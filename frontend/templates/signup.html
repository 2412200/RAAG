<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORGELINK — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1e1e1e;
      --border-active: #3a1a1a;
      --accent: #e03030;
      --accent-dim: rgba(224,48,48,0.12);
      --text: #f0f0f0;
      --muted: #555555;
      --error: #ff6b6b;
      --success: #e03030;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── GRID BACKGROUND ── */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(224,48,48,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224,48,48,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── BRAND PANEL ── */
    .panel--brand {
      position: relative;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      overflow: hidden;
    }

    .panel--brand::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(224,48,48,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.1em;
    }

    .logo-mark {
      width: 28px; height: 28px;
      border: 2px solid var(--accent);
      transform: rotate(45deg);
      position: relative;
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: var(--accent);
      transform: rotate(0deg);
    }

    .overline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 8px;
      display: block;
    }

    .brand-copy {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0;
    }

    .display {
      font-family: var(--font-display);
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .accent { color: var(--accent); }

    .brand-copy p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 320px;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 48px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .step.is-active { opacity: 1; }
    .step.is-done { opacity: 0.7; }

    .step-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      width: 28px; height: 28px;
      border: 1px solid var(--border-active);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step.is-active .step-num {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .step.is-done .step-num {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .step-label {
      font-size: 13px;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    .brand-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .brand-meta div {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .dot { color: #e03030; }

    /* ── FORM PANEL ── */
    .panel--form {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 40px;
      width: 100%;
    }

    .form {
      width: 100%;
      max-width: 480px;
      padding: 20px 0;
    }

    .form-head {
      margin-bottom: 32px;
    }

    .form-head .display {
      font-size: clamp(28px, 3vw, 42px);
      margin: 8px 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    /* Role toggle */
    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .role-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text);
    }

    .role-btn:hover { border-color: var(--border-active); }

    .role-btn.is-active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .role-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    .role-btn.is-active .role-num { color: var(--accent); }

    .role-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .role-tag {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Fields */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-full { grid-column: 1 / -1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .field input::placeholder { color: #333; }

    .field input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(224,48,48,0.08);
    }

    .field input.is-invalid { border-color: var(--error); }
    .field.has-error input { border-color: var(--error); }

    .field-error {
      font-size: 11px;
      color: var(--error);
      font-family: var(--font-mono);
      min-height: 16px;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .link-btn:hover { color: var(--text); }

    /* Password strength */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .strength-seg {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    /* CTA button */
    .cta {
      width: 100%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .cta:active { transform: translateY(0); }
    .cta:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .status.is-error { background: rgba(255,77,77,0.1); color: var(--error); border: 1px solid rgba(255,77,77,0.2); }
    .status.is-success { background: rgba(71,255,178,0.1); color: var(--success); border: 1px solid rgba(71,255,178,0.2); }

    .form-foot {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .link:hover { text-decoration: underline; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form > * {
      animation: fadeUp 0.4s ease both;
    }

    .form > *:nth-child(1) { animation-delay: 0.05s; }
    .form > *:nth-child(2) { animation-delay: 0.10s; }
    .form > *:nth-child(3) { animation-delay: 0.15s; }
    .form > *:nth-child(4) { animation-delay: 0.20s; }
    .form > *:nth-child(5) { animation-delay: 0.25s; }

    /* Responsive */
    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .panel--brand { display: none; }
      .panel--form { padding: 32px 20px; }
      .fields-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- RIGHT PANEL -->
    <section class="panel--form">
      <form id="signup-form" class="form" novalidate>

        <div class="form-head">
          <span class="overline">[ 02 / CREATE ACCOUNT ]</span>
          <h1 class="display">Register.</h1>
          <p class="subtitle">Set up your verified trade profile.</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" role="tablist" aria-label="Select role">
          <button type="button" class="role-btn is-active" data-role="manufacturer" role="tab" aria-selected="true">
            <span class="role-num">01</span>
            <span class="role-name">Manufacturer</span>
          </button>
          <button type="button" class="role-btn" data-role="retailer" role="tab" aria-selected="false">
            <span class="role-num">02</span>
            <span class="role-name">Retailer</span>
          </button>
        </div>

        <div class="divider"><span>COMPANY INFO</span></div>

        <!-- Fields grid -->
        <div class="fields-grid">

          <!-- Company Name -->
          <label class="field field-full">
            <span class="field-label" id="business-label"> Company Name </span>
            <input id="company_name" placeholder="Acme Industries Ltd." required />
            <span class="field-error" id="company-error"></span>
          </label>

          <!-- Owner Name -->
          <label class="field field-full">
              <span class="field-label">Owner Name</span>
              <input
                  id="owner_name"
                  name="owner_name"
                  type="text"
                  placeholder="John Doe"
                  required
              />
              <span class="field-error" id="owner-error"></span>
          </label>

          <!-- Phone -->
          <label class="field">
            <span class="field-label">Phone Number</span>
            <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" required />
            <span class="field-error" id="phone-error"></span>
          </label>

          <!-- Address -->
          <label class="field">
            <span class="field-label">Address</span>
            <input id="address" name="address" type="text" placeholder="City, State" required />
            <span class="field-error" id="address-error"></span>
          </label>

        </div>

        <div class="divider"><span>CREDENTIALS</span></div>

        <div class="fields-grid">

          <!-- Password -->
          <label class="field">
            <span class="field-label">
              Password
              <button type="button" id="toggle-password" class="link-btn" aria-label="Show password">show</button>
            </span>
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
            <div class="strength-bar">
              <div class="strength-seg" id="seg1"></div>
              <div class="strength-seg" id="seg2"></div>
              <div class="strength-seg" id="seg3"></div>
              <div class="strength-seg" id="seg4"></div>
            </div>
            <span class="field-error" id="password-error"></span>
          </label>

          <!-- Confirm Password -->
          <label class="field">
            <span class="field-label">Confirm Password</span>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="••••••••" required />
            <span class="field-error" id="confirm-error"></span>
          </label>

        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="cta">
          <span class="cta-label">Create <span id="role-display">Manufacturer</span> Account</span>
          <span>→</span>
        </button>

        <!-- Status -->
        <div id="status" class="status" hidden></div>

        <p class="form-foot">
          Already have an account?
          <a href="/" class="link">Sign in →</a>
        </p>

      </form>
    </section>
  </main>

  <script>
  (() => {
  'use strict';

  const form = document.getElementById('signup-form');
  const roleButtons = document.querySelectorAll('.role-btn');
  const roleDisplay = document.getElementById('role-display');
  const submitBtn = document.getElementById('submit-btn');
  const status = document.getElementById('status');

  const togglePwBtn = document.getElementById('toggle-password');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm-password');

  const companyInput = document.getElementById('company_name');
  const businessLabel = document.getElementById('business-label');
  const ownerInput = document.getElementById('owner_name');

  let selectedRole = 'manufacturer';

  // ------------------------------
  // Role Toggle
  // ------------------------------
  roleButtons.forEach(btn => {
    btn.addEventListener('click', () => {

      roleButtons.forEach(b => {
        b.classList.remove('is-active');
        b.setAttribute('aria-selected', 'false');
      });

      btn.classList.add('is-active');
      btn.setAttribute('aria-selected', 'true');

      selectedRole = btn.dataset.role;

      roleDisplay.textContent =
        selectedRole.charAt(0).toUpperCase() +
        selectedRole.slice(1);

      if (selectedRole === "manufacturer") {

        businessLabel.textContent = "Company Name";
        companyInput.placeholder = "Acme Industries Ltd.";

      } else {

        businessLabel.textContent = "Shop Name";
        companyInput.placeholder = "ABC Retail Store";

      }
    });
  });

  // ------------------------------
  // Show / Hide Password
  // ------------------------------
  togglePwBtn.addEventListener('click', () => {

    const show = passwordInput.type === 'password';

    passwordInput.type = show ? 'text' : 'password';

    togglePwBtn.textContent =
      show ? 'hide' : 'show';
  });

  // ------------------------------
  // Password Strength
  // ------------------------------
  const segs = [
    document.getElementById('seg1'),
    document.getElementById('seg2'),
    document.getElementById('seg3'),
    document.getElementById('seg4')
  ];

  const strengthColors = [
    '#e03030',
    '#c44020',
    '#ff6b6b',
    '#ff9999'
  ];

  function calcStrength(password) {

    let score = 0;

    if (password.length >= 6) score++;
    if (password.length >= 10) score++;
    if (/[A-Z]/.test(password) && /[0-9]/.test(password))
      score++;
    if (/[^A-Za-z0-9]/.test(password))
      score++;

    return score;
  }

  passwordInput.addEventListener('input', () => {

    const score =
      calcStrength(passwordInput.value);

    segs.forEach((seg, index) => {

      seg.style.background =
        index < score
          ? strengthColors[score - 1]
          : 'var(--border)';
    });
  });

  // ------------------------------
  // Validation Helpers
  // ------------------------------
  function setError(inputEl, errorId, message) {

    const errorEl =
      document.getElementById(errorId);

    if (message) {

      inputEl.classList.add('is-invalid');
      errorEl.textContent = message;

    } else {

      inputEl.classList.remove('is-invalid');
      errorEl.textContent = '';
    }
  }

  function validate() {

    let valid = true;

    const company =
      companyInput.value.trim();

    const owner =
      ownerInput.value.trim();

    const phone =
      document.getElementById('phone')
        .value.trim();

    const address =
      document.getElementById('address')
        .value.trim();

    const password =
      passwordInput.value;

    const confirmPassword =
      confirmInput.value;

    // Company / Shop

    if (!company) {

      setError(
        companyInput,
        'company-error',
        selectedRole === "manufacturer"
          ? "Company name is required."
          : "Shop name is required."
      );

      valid = false;

    } else {

      setError(
        companyInput,
        'company-error',
        ''
      );
    }

    // Owner

    if (!owner) {

      setError(
        ownerInput,
        'owner-error',
        'Owner name is required.'
      );

      valid = false;

    } else {

      setError(
        ownerInput,
        'owner-error',
        ''
      );
    }

    // Phone

    if (!phone) {

      setError(
        document.getElementById('phone'),
        'phone-error',
        'Phone number is required.'
      );

      valid = false;

    } else if (
      !/^[+\d\s\-()]{7,15}$/.test(phone)
    ) {

      setError(
        document.getElementById('phone'),
        'phone-error',
        'Enter a valid phone number.'
      );

      valid = false;

    } else {

      setError(
        document.getElementById('phone'),
        'phone-error',
        ''
      );
    }

    // Address

    if (!address) {

      setError(
        document.getElementById('address'),
        'address-error',
        'Address is required.'
      );

      valid = false;

    } else {

      setError(
        document.getElementById('address'),
        'address-error',
        ''
      );
    }

    // Password

    if (!password) {

      setError(
        passwordInput,
        'password-error',
        'Password is required.'
      );

      valid = false;

    } else if (password.length < 6) {

      setError(
        passwordInput,
        'password-error',
        'Minimum 6 characters.'
      );

      valid = false;

    } else {

      setError(
        passwordInput,
        'password-error',
        ''
      );
    }

    // Confirm Password

    if (!confirmPassword) {

      setError(
        confirmInput,
        'confirm-error',
        'Confirm your password.'
      );

      valid = false;

    } else if (
      password !== confirmPassword
    ) {

      setError(
        confirmInput,
        'confirm-error',
        'Passwords do not match.'
      );

      valid = false;

    } else {

      setError(
        confirmInput,
        'confirm-error',
        ''
      );
    }

    return valid;
  }

  // ------------------------------
  // Status Message
  // ------------------------------
  function showStatus(message, type) {

    status.hidden = false;

    status.className =
      `status ${
        type === 'success'
          ? 'is-success'
          : 'is-error'
      }`;

    status.textContent = message;
  }

  function clearStatus() {

    status.hidden = true;
    status.className = 'status';
  }

  // ------------------------------
  // Submit Form
  // ------------------------------
  form.addEventListener('submit', async e => {

    e.preventDefault();

    clearStatus();

    if (!validate()) return;

    submitBtn.disabled = true;

    const originalLabel =
      submitBtn.querySelector('.cta-label')
        .textContent;

    submitBtn.querySelector('.cta-label')
      .textContent =
      'Creating account...';

    const payload = {

      business_name:
        companyInput.value.trim(),

      owner_name:
        ownerInput.value.trim(),

      phone:
        document.getElementById('phone')
          .value.trim(),

      address:
        document.getElementById('address')
          .value.trim(),

      password:
        passwordInput.value,

      role:
        selectedRole
    };

    try {

      const response = await fetch(
        '/POST/signup',
        {
          method: 'POST',
          headers: {
            'Content-Type':
              'application/json'
          },
          body: JSON.stringify(payload)
        }
      );

      const data =
        await response.json();

      if (!response.ok) {

        showStatus(
          data.detail ||
          'Signup failed.',
          'error'
        );

        return;
      }

      showStatus(
        'Account created successfully!',
        'success'
      );

      setTimeout(() => {

        window.location.href = '/';

      }, 1500);

    } catch (error) {

      console.error(error);

      showStatus(
        'Network error.',
        'error'
      );

    } finally {

      submitBtn.disabled = false;

      submitBtn.querySelector('.cta-label')
        .textContent =
        originalLabel;
    }
  });

})();
  </script>
</body>
</html>
