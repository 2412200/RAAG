<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/cart.css?v=1.0.9">
    <script src="/static/js/cart.js?v=1.0.9"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D0D0D;
            color: #F5F0ED;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .site {
            min-height: 100vh;
            background: #0D0D0D;
            display: flex;
            flex-direction: row;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #181818;
            border-right: 1px solid #8B0D1C;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: #A89B92;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: #222;
            color: #F5F0ED;
        }

        .menu-item.active {
            background: #8B0D1C;
            color: #F5F0ED;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .dashboard-title h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard-title p {
            color: #A89B92;
            font-size: 14px;
            margin-top: 4px;
        }

        .logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        /* Mobile Nav styles */
        .mobile-navbar {
            display: none;
            background: #181818;
            border-bottom: 1px solid #8B0D1C;
            padding: 10px 20px;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .mobile-navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: #E8293F;
            letter-spacing: 2px;
        }

        .sidebar-toggle-btn {
            background: transparent;
            border: 1px solid #8B0D1C;
            color: #F5F0ED;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-toggle-btn:hover {
            background: #222;
        }

        .mobile-logout-btn {
            color: #E8293F;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #8B0D1C;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .mobile-logout-btn:hover {
            background: #C0172A;
            color: #F5F0ED;
            border-color: #C0172A;
        }

        .cart-container {
            max-width: 900px;
            margin: 0;
            padding: 20px 0;
        }

        .cart-item {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: border-color 0.2s;
        }

        .cart-item:hover {
            border-color: #8B0D1C !important;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .cart-info {
            flex: 1;
        }

        .cart-info h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
            font-size: 17px;
            margin-bottom: 4px;
        }

        .cart-info p {
            color: #A89B92;
            font-size: 13px;
        }

        .cart-price {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 800;
            color: #D4A847;
        }

        .remove-btn {
            border-color: #8B0D1C !important;
            color: #E8293F !important;
            border-radius: 8px;
            background: transparent;
            border: 1px solid #333;
            padding: 7px 14px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: rgba(139, 13, 28, 0.2) !important;
        }

        .cart-summary {
            background: #181818 !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
            padding: 24px;
            text-align: right;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            margin-top: 10px;
        }

        .cart-summary h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #F5F0ED;
            margin-bottom: 16px;
        }

        .confirm-btn {
            background: #C0172A !important;
            color: #F5F0ED !important;
            border-radius: 8px;
            border: none;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn:hover {
            background: #E8293F !important;
            transform: translateY(-1px);
        }

        .empty-msg {
            color: #A89B92;
            margin-top: 60px;
            font-size: 16px;
            text-align: center;
        }

        footer {
            background: #181818;
            border-top: 1px solid #8B0D1C;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            color: #C0172A;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .footer-note {
            font-size: 12px;
            color: #A89B92;
        }

        /* ── RESPONSIVE MEDIA QUERIES ── */
        @media (max-width: 768px) {
            .site {
                flex-direction: column;
            }

            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 60px;
                bottom: 0;
                left: 0;
                width: 280px;
                z-index: 1001;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                min-height: calc(100vh - 60px);
            }

            .mobile-navbar {
                display: flex;
            }

            .dashboard-header {
                display: none;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                position: relative;
                padding: 16px;
            }

            .cart-item img {
                width: 100%;
                height: 160px;
            }

            .remove-btn {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .cart-summary {
                padding: 16px;
                text-align: center;
            }

            footer {
                padding: 1.25rem 1rem;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
  <script src="/static/js/theme-toggle.js"></script>
</head>

<body>
  <!-- Mobile Navbar -->
  <div class="mobile-navbar">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">☰</button>
    <div class="mobile-navbar-brand">RAAG</div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button id="mobile-cart-toggle" class="sidebar-toggle-btn" style="position: relative; border: none; font-size: 18px;" aria-label="Toggle Cart">
        🛒<span id="mobile-cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; display: none;">0</span>
      </button>
      <a href="/logout" class="mobile-logout-btn">Logout</a>
    </div>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">RAAG</div>
        <nav class="sidebar-menu">
          <a href="/home" id="nav-home" class="menu-item">
            Home
          </a>
          <a href="/orders" id="nav-orders" class="menu-item">
            My Orders
          </a>
        </nav>
      </div>
      <div id="sidebar-cart" class="sidebar-cart"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="dashboard-title">
          <h1>My Cart</h1>
          <p>Review items in your shopping cart and checkout</p>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
      </header>

      <div class="cart-container">
        <div id="cart-view-list"></div>
        <div id="cart-summary-section" style="display:none;" class="cart-summary">
            <h2>Total: ₹<span id="total-price-val">0</span></h2>
            <button class="confirm-btn" onclick="window.location.href='/confirm'">Confirm</button>
        </div>
        <div id="cart-empty-msg" class="empty-msg" style="display:block;">No items in your cart yet.</div>
      </div>

      <!-- Payment Modal -->
      <div id="cart-page-payment-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; padding: 20px;">
        <div style="background:#181818; border:1px solid #8B0D1C; border-radius:16px; padding:30px; max-width:450px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,0.5);">
          <h3 style="font-family:'Playfair Display', serif; font-size:22px; font-weight:700; color:#F5F0ED; margin-bottom:12px; text-align:center;">Secure Checkout</h3>
          <p style="color:#A89B92; font-size:13px; text-align:center; margin-bottom:24px;">Please complete the mock payment details below to authorize this transaction.</p>
          
          <div style="display:flex; flex-direction:column; gap:16px; margin-bottom:24px; text-align:left;">
            <div>
              <label style="display:block; font-size:11px; color:#A89B92; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">Cardholder Name</label>
              <input type="text" id="cart-page-card-name" placeholder="John Doe" value="Buyer Customer" style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:14px; outline:none;">
            </div>
            <div>
              <label style="display:block; font-size:11px; color:#A89B92; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">Card Number</label>
              <input type="text" id="cart-page-card-number" placeholder="4111 2222 3333 4444" value="4111 5555 6666 7777" style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:14px; outline:none;">
            </div>
            <div style="display:flex; gap:12px;">
              <div style="flex:1;">
                <label style="display:block; font-size:11px; color:#A89B92; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">Expiry Date</label>
                <input type="text" id="cart-page-card-expiry" placeholder="MM/YY" value="12/28" style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:14px; outline:none;">
              </div>
              <div style="flex:1;">
                <label style="display:block; font-size:11px; color:#A89B92; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">CVV</label>
                <input type="password" id="cart-page-card-cvv" placeholder="123" value="999" style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:14px; outline:none;">
              </div>
            </div>
          </div>
          
          <div style="display:flex; gap:12px; justify-content:flex-end;">
            <button onclick="closeCartPagePaymentModal()" style="padding:10px 16px; background:transparent; border:1px solid #333; color:#A89B92; border-radius:8px; font-size:13px; cursor:pointer; font-weight:500;">Cancel</button>
            <button onclick="confirmCartPageOrder()" style="padding:10px 20px; background:#C0172A; border:none; color:#fff; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; transition: background .2s;">Pay & Place Order</button>
          </div>
        </div>
      </div>

      <footer>
        <span class="footer-brand">RAAG.COM</span>
        <span class="footer-note">© 2026 Raag. All rights reserved.</span>
      </footer>
    </main>
  </div>

    <script>
        function loadCartPage() {
            const orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            const list = document.getElementById('cart-view-list');
            const summary = document.getElementById('cart-summary-section');
            const emptyMsg = document.getElementById('cart-empty-msg');
            const totalEl = document.getElementById('total-price-val');

            list.innerHTML = '';

            if (orders.length === 0) {
                emptyMsg.style.display = 'block';
                summary.style.display = 'none';
                return;
            }

            emptyMsg.style.display = 'none';
            summary.style.display = 'block';

            let total = 0;

            orders.forEach((item, index) => {
                const qty = item.qty || 1;
                const itemTotal = item.price * qty;
                total += itemTotal;
                const imageSrc = item.image.startsWith('http') ? item.image : (item.image.startsWith('/') ? item.image : `/static/images/${item.image}`);
                const moqVal = parseInt(item.moq || 1);

                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${imageSrc}" alt="${item.name}" onerror="this.onerror=null;this.src='/static/images/default.webp'">
                        <div class="cart-info">
                            <h3 style="font-family:'Playfair Display', serif; font-size:18px; margin-bottom:8px; font-weight:700;">${item.name}</h3>
                            <div style="display: flex; flex-direction: column; gap: 4px; font-size:13px; color:#A89B92; margin-bottom: 12px;">
                                <span>Name: <strong style="color:#F5F0ED;">${item.name}</strong></span>
                                <span>Price: <strong style="color:#F5F0ED;">₹${item.price.toLocaleString()}</strong></span>
                                <span>Quantity: <strong style="color:#F5F0ED;">${qty}</strong> <span style="font-size:11px; color:#666;">(Min Required: ${moqVal})</span></span>
                                <span>Total Price: <strong style="color:#D4A847;">₹${itemTotal.toLocaleString()}</strong></span>
                            </div>
                            
                            <!-- Custom Quantity Control matching standard UI but slightly larger for page -->
                            <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <button onclick="changePageQty(${index}, -1)" style="width:24px; height:24px; border:1px solid #333; background:transparent; color:#fff; border-radius:4px; cursor:pointer;">-</button>
                                    <span style="font-weight:600; min-width:20px; text-align:center;">${qty}</span>
                                    <button onclick="changePageQty(${index}, 1)" style="width:24px; height:24px; border:1px solid #333; background:transparent; color:#fff; border-radius:4px; cursor:pointer;">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="cart-price">₹${itemTotal.toLocaleString()}</div>
                        <button class="remove-btn" onclick="removePageItem(${index})">Remove</button>
                    </div>
                `;
            });

            totalEl.textContent = total.toLocaleString();
        }

        function changePageQty(index, delta) {
            let orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            if (!orders[index]) return;

            const item = orders[index];
            const moqVal = parseInt(item.moq || 1);
            const currentQty = item.qty || moqVal;
            const newQty = currentQty + delta;

            if (newQty < moqVal) {
                alert(`Minimum order quantity for this item is ${moqVal} units.`);
                item.qty = moqVal;
            } else {
                item.qty = newQty;
            }

            localStorage.setItem('orderItems', JSON.stringify(orders));
            loadCartPage();
            
            // Sync sidebar cart
            if (typeof updateSidebarCart === 'function') {
                updateSidebarCart();
            }
        }

        function syncCartPageQty(index, newQty) {
            loadCartPage();
        }

        function removePageItem(index) {
            let orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            orders.splice(index, 1);
            localStorage.setItem('orderItems', JSON.stringify(orders));
            loadCartPage();
            
            // Sync sidebar cart
            if (typeof updateSidebarCart === 'function') {
                updateSidebarCart();
            }
        }

        function openCartPagePaymentModal() {
            document.getElementById('cart-page-payment-modal').style.display = 'flex';
        }

        function closeCartPagePaymentModal() {
            document.getElementById('cart-page-payment-modal').style.display = 'none';
        }

        async function confirmCartPageOrder() {
            closeCartPagePaymentModal();
            const orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
            if (orders.length === 0) return;

            const products = orders.map(item => ({
                product_name: item.name,
                quantity: parseInt(item.qty || 1),
                price: parseFloat(item.price)
            }));
            const total_amount = orders.reduce((sum, item) => sum + (item.price * (item.qty || 1)), 0);

            const payload = {
                customer_name: document.getElementById('cart-page-card-name').value || "Buyer Customer",
                customer_number: 9999999999,
                products: products,
                total_amount: total_amount
            };

            try {
                const res = await fetch('/POST/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    localStorage.removeItem('orderItems');
                    alert('Order confirmed and mock payment processed successfully!');
                    loadCartPage();
                    if (typeof updateSidebarCart === 'function') {
                        updateSidebarCart();
                    }
                    window.location.href = '/orders';
                } else {
                    const data = await res.json();
                    alert('Failed to place order: ' + (data.detail || 'Please try again.'));
                }
            } catch (err) {
                console.error(err);
                alert('Network error. Please try again.');
            }
        }

        // Load page
        document.addEventListener('DOMContentLoaded', () => {
            loadCartPage();
        });
    </script>
  <script src="{{ url_for('static', path='js/logout.js') }}"></script>
</body>
</html>
