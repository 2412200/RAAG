<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mens Wear</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/category.css') }}?v=1.0.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-left">
      <a href="/" class="nav-logo">RAAG</a>
      <div class="nav-links">
        <a href="/home">Home</a>
        <a href="/orders">My Orders</a>
      </div>
    </div>
    <div class="nav-right">
      <a href="/">Seller Login</a>
      <a href="/logout" class="btn-logout" onclick="return confirm('Are you sure?');">Logout</a>
      <a class="btn-account" href="#">My Account</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-accent"></div>
    <div>
      <div class="breadcrumb"><a href="/home">Home</a> &nbsp;/&nbsp; Mens Wear</div>
      <h1 class="page-title">Mens Wear</h1>
    </div>
  </div>

  <div class="products-container">
    {% for product in Products %}
    <div class="product-card">
      <div class="product-img-wrap">
        <img
          src="{% if product.image.startswith('http') %}{{ product.image }}{% else %}{{ url_for('static', path='images/' + product.image) }}{% endif %}"
          alt="{{ product.name }}" />

        <div class="product-img-overlay"></div>
        <span class="quick-view">View Details</span>
      </div>
      <div class="product-info">
        <p class="product-name">{{ product.name }}</p>
        <p class="product-price">₹{{ product.price }}</p>
        <p class="product-moq">Min. order: {{ product.quantity }} units</p>
        <button class="add-btn" onclick="addToOrder({
            name: '{{ product.name }}',
            image: '{{ product.image }}',
            quantity: {{ product.quantity }},
            price: {{ product.price }}
          })">
          Add to Order
        </button>
      </div>
    </div>
    {% endfor %}
  </div>

  <footer>
    <span class="footer-brand">RAAG.COM</span>
    <span class="footer-note">© 2026 Raag. All rights reserved.</span>
  </footer>

  <div id="toast">✅ Item added to order!</div>

  <script>
    function addToOrder(product) {
      let orders = JSON.parse(localStorage.getItem('orderItems') || '[]');
      const existing = orders.find(item => item.name === product.name);
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        orders.push({ ...product, qty: 1 });
      }
      localStorage.setItem('orderItems', JSON.stringify(orders));

      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2000);
    }
  </script>
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447"
    integrity="sha512-57MDmcccJXYtNnH+ZiBwzC4jb2rvgVCEokYN+L/nLlmO8rfYT/gIpW2A569iJ/3b+0UEasghjuZH/ma3wIs/EQ=="
    data-cf-beacon='{"version":"2024.11.0","token":"7f7b0fd8732c4326aae4b9d58d5c514a","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}'
    crossorigin="anonymous"></script>
</body>

</html>
